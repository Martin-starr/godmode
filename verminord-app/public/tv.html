<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e14;--card:#141a24;--border:#1e2a3a;
  --text:#e0e6ed;--muted:#6b7d93;--accent:#4fc3f7;
  --green:#66bb6a;--gold:#ffa726;--red:#ef5350;
  --teal:#26a69a;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
.container{display:flex;flex-direction:column;height:100vh;padding:20px 28px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0}
.logo{font-size:28px;font-weight:700;letter-spacing:2px;color:var(--accent)}
.logo span{color:var(--muted);font-weight:400;font-size:16px;margin-left:12px}
.clock{font-size:22px;color:var(--muted);font-variant-numeric:tabular-nums}
.kpi-bar{display:flex;gap:12px;margin-bottom:16px;flex-shrink:0}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;flex:1;text-align:center}
.kpi .value{font-size:28px;font-weight:700}
.kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.kpi.green .value{color:var(--green)}
.kpi.gold .value{color:var(--gold)}
.kpi.red .value{color:var(--red)}
.kpi.teal .value{color:var(--teal)}
.kpi.accent .value{color:var(--accent)}
.grid{display:grid;gap:12px;flex:1;min-height:0}
.grid.g9{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
.grid.g8{grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr)}
.grid.g6{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;flex-direction:column;overflow:hidden;position:relative}
.card.ok{border-left:4px solid var(--green)}
.card.watch{border-left:4px solid var(--gold)}
.card.under{border-left:4px solid var(--red)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-name{font-size:17px;font-weight:700}
.card-status{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.5px}
.card.ok .card-status{background:rgba(102,187,106,.15);color:var(--green)}
.card.watch .card-status{background:rgba(255,167,38,.15);color:var(--gold)}
.card.under .card-status{background:rgba(239,83,80,.15);color:var(--red)}
.card-updated{font-size:11px;color:var(--muted)}
.metrics{display:flex;gap:16px;margin:8px 0}
.metric{flex:1}
.metric .val{font-size:22px;font-weight:700}
.metric .unit{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.metric.in-range .val{color:var(--green)}
.metric.out-range .val{color:var(--gold)}
.chart-area{flex:1;min-height:0;position:relative}
canvas{width:100%!important;height:100%!important}
.hygiene{background:rgba(38,166,154,.08);border:1px solid rgba(38,166,154,.2);border-radius:8px;padding:6px 10px;margin-top:4px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.hygiene .streak-val{font-weight:700;color:var(--teal)}
.hygiene.fail{background:rgba(239,83,80,.08);border-color:rgba(239,83,80,.2)}
.hygiene.fail .streak-val{color:var(--red)}
.range-tabs{display:flex;gap:6px;margin-bottom:12px;flex-shrink:0}
.range-tab{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-weight:600}
.range-tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-shrink:0}
.regulatory{display:flex;gap:12px;flex-wrap:wrap}
.reg-item{font-size:12px;padding:4px 12px;border-radius:6px}
.reg-item.green{background:rgba(102,187,106,.12);color:var(--green)}
.reg-item.bad{background:rgba(239,83,80,.12);color:var(--red)}
.sync-info{font-size:11px;color:var(--muted)}
.no-data{color:var(--muted);font-size:14px;text-align:center;padding-top:20px}
</style>
</head>
