<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verminord · Carousel Studio</title>

<!-- ============================================================
     LIBRARIES
     ============================================================ -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- ============================================================
     BRAND TYPOGRAPHY  —  IBM Plex family
       · IBM Plex Sans  700  → bold main title
       · IBM Plex Serif italic → serif subtitle line
       · IBM Plex Serif 400  → body text
       · IBM Plex Mono  300/400 → tag + VERMINORD.COM (ALL CAPS, tracked)
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet" />

<style>
  /* ==========================================================
     BRAND TOKENS  (from the Verminord brand guide)
     ========================================================== */
  :root {
    --navy:  #1C3A5C;   /* Primær — headers, cover      */
    --gold:  #B8993A;   /* Aksent — linjer, labels       */
    --cream: #F6F2EA;   /* Flate — bakgrunn, bokser      */
    --white: #FFFFFF;   /* Innholdsflate                 */
    --ink:   #1A1A1A;   /* Brødtekst på lys bg           */
    --muted: #5A6270;   /* Sekundær — footer             */

    /* editor chrome (dark studio UI — not part of the exported art) */
    --ui-bg:     #0e1116;
    --ui-panel:  #141922;
    --ui-panel2: #10151d;
    --ui-line:   #212836;
    --ui-line2:  #2c3444;
    --ui-text:   #e6ebf2;
    --ui-dim:    #8b97a8;
    --ui-faint:  #5d6879;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    background: var(--ui-bg);
    color: var(--ui-text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #263042; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #33415a; }

  /* ---------- editor primitives ---------- */
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ui-faint);
  }
  .lbl { font-size: 11.5px; font-weight: 500; color: var(--ui-dim); display:block; margin-bottom: 6px; }
  .inp {
    width: 100%;
    background: var(--ui-panel2);
    border: 1px solid var(--ui-line);
    border-radius: 9px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--ui-text);
    outline: none;
    transition: border-color .15s, background .15s;
  }
  .inp:focus { border-color: #4d6ea0; background: #121824; }
  textarea.inp { resize: vertical; min-height: 92px; line-height: 1.55; }

  .btn {
    font-size: 12px; font-weight: 600;
    border-radius: 9px;
    padding: 8px 13px;
    border: 1px solid var(--ui-line2);
    color: var(--ui-dim);
    background: var(--ui-panel2);
    cursor: pointer;
    transition: all .13s;
    white-space: nowrap;
  }
  .btn:hover { color: var(--ui-text); border-color: #3d4c66; }
  .btn-primary {
    background: var(--gold); color: #1a1403; border-color: var(--gold);
    font-weight: 700;
  }
  .btn-primary:hover { background: #cbab48; border-color: #cbab48; color:#1a1403; }
  .btn-icon { padding: 7px; display:inline-flex; align-items:center; justify-content:center; }

  /* segmented control */
  .seg { display:inline-flex; background: var(--ui-panel2); border:1px solid var(--ui-line); border-radius: 10px; padding: 3px; gap: 2px; }
  .seg > button {
    font-size: 11.5px; font-weight: 600;
    padding: 6px 12px; border-radius: 7px;
    color: var(--ui-dim); cursor: pointer; border: none; background: transparent;
    transition: all .12s;
  }
  .seg > button.on { background: #263149; color: #fff; }
  .seg.light > button.on { background: var(--gold); color:#1a1403; }

  /* swatches */
  .sw { width: 26px; height: 26px; border-radius: 7px; border: 2px solid transparent; cursor: pointer; transition: transform .1s, border-color .1s; }
  .sw:hover { transform: scale(1.1); }
  .sw.on { border-color: #fff; }

  .chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    padding: 5px 10px; border-radius: 999px;
    border: 1px solid var(--ui-line2); color: var(--ui-dim);
    cursor: pointer; white-space: nowrap; transition: all .12s;
  }
  .chip:hover { color: var(--ui-text); border-color:#3d4c66; }
  .chip.on { background: var(--ui-text); color: var(--ui-bg); border-color: var(--ui-text); }

  /* template cards */
  .tpl { text-align:left; width:100%; background: var(--ui-panel2); border:1px solid var(--ui-line); border-radius: 11px; padding: 11px 13px; cursor:pointer; transition: all .14s; }
  .tpl:hover { border-color:#3d4c66; background:#131a26; }
  .tpl.on { border-color: var(--gold); }

  hr.div { border:none; border-top:1px solid var(--ui-line); margin: 0; }

  input[type=range] { -webkit-appearance:none; appearance:none; height: 4px; border-radius: 3px; background: var(--ui-line2); outline:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background: var(--gold); cursor:pointer; border: 2px solid #1a1f2b; }
  input[type=range]::-moz-range-thumb { width:16px; height:16px; border-radius:50%; background: var(--gold); cursor:pointer; border: 2px solid #1a1f2b; }

  input[type=color] { -webkit-appearance:none; appearance:none; border:1px solid var(--ui-line); border-radius:8px; background:transparent; cursor:pointer; padding:2px; }
  input[type=color]::-webkit-color-swatch-wrapper { padding:0; }
  input[type=color]::-webkit-color-swatch { border:none; border-radius:6px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1a2330; border:1px solid var(--ui-line2); color: var(--ui-text);
    padding: 10px 16px; border-radius: 10px; font-size: 12.5px; font-weight:500;
    opacity:0; pointer-events:none; transition: all .25s; z-index: 100;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
  }
  .toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

  /* ==========================================================
     THE SLIDE ARTBOARD  —  1080-based, brand-locked layout
     No gradients. No shadows on the art (brand rule).
     ========================================================== */
  .ig {
    position: relative;
    width: 1080px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--navy);
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .ig.r45 { height: 1350px; }
  .ig.r11 { height: 1080px; }
  .ig.r916 { height: 1920px; }

  .ig-photo { position:absolute; inset:0; width:100%; height:100%; object-fit: cover; }
  .ig-tint  { position:absolute; inset:0; }

  .ig-logo { position:absolute; top: 84px; left: 84px; display:flex; flex-direction:column; gap: 8px; }
  .ig-logo svg { height: 42px; width: auto; display:block; }
  .ig-logo .wm { font-family:'IBM Plex Sans',sans-serif; font-weight:500; font-size: 40px; line-height:1; letter-spacing: .005em; }

  .ig-tag {
    position:absolute; top: 96px; right: 84px;
    font-family:'IBM Plex Mono', monospace; font-weight: 400;
    font-size: 21px; letter-spacing: 0.34em; text-transform: uppercase;
    text-align: right; max-width: 520px; line-height: 1.7;
  }

  .ig-center {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding: 120px 110px 150px;
    --ts: 1;
  }
  .ig-title    { font-family:'IBM Plex Sans',sans-serif; font-weight:700; font-size: calc(88px * var(--ts)); line-height: 1.04; letter-spacing: -0.012em; }
  .ig-subtitle { font-family:'IBM Plex Serif',serif; font-style: italic; font-weight:500; font-size: calc(76px * var(--ts)); line-height: 1.1; margin-top: 2px; }
  .ig-body     { font-family:'IBM Plex Serif',serif; font-weight:400; font-size: calc(30px * var(--ts)); line-height: 1.66; margin-top: 40px; max-width: 780px; }

  .ig-site {
    position:absolute; bottom: 74px; left:0; right:0; text-align:center;
    font-family:'IBM Plex Mono', monospace; font-weight: 400;
    font-size: 20px; letter-spacing: 0.4em; text-transform: uppercase;
    text-indent: 0.4em;
  }
</style>
</head>

<body>
<div class="flex h-screen">

  <!-- ================= LEFT · CONTENT LIBRARY ================= -->
  <aside class="w-[288px] shrink-0 flex flex-col border-r" style="border-color:var(--ui-line); background:var(--ui-panel)">
    <div class="px-5 pt-5 pb-4 border-b" style="border-color:var(--ui-line)">
      <div class="flex items-center gap-2.5">
        <svg viewBox="0 0 200 60" class="h-6 w-auto" fill="none" stroke="#B8993A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="19" cy="35" r="10"/><circle cx="16" cy="32" r="2.4" fill="#B8993A" stroke="none"/>
          <path d="M31 44 C44 16 66 16 78 44 C90 18 110 18 120 42 C130 22 146 22 154 40 C161 26 173 26 181 40"/>
        </svg>
        <div>
          <div class="text-[15px] font-bold tracking-tight leading-none">Verminord</div>
          <div class="eyebrow mt-1">Carousel Studio</div>
        </div>
      </div>
    </div>

    <div class="px-5 pt-4 pb-3 space-y-3 border-b" style="border-color:var(--ui-line)">
      <input id="tplSearch" class="inp" placeholder="Search carousels…" />
      <div id="catChips" class="flex flex-wrap gap-1.5"></div>
    </div>

    <div class="px-5 pt-2 pb-1 flex items-center justify-between">
      <span class="eyebrow">Templates</span>
      <span id="tplCount" class="eyebrow"></span>
    </div>
    <div id="tplList" class="flex-1 overflow-y-auto px-5 pb-5 pt-1 space-y-2"></div>
  </aside>

  <!-- ================= CENTER · CANVAS ================= -->
  <main class="flex-1 flex flex-col min-w-0">
    <!-- top bar -->
    <header class="flex items-center justify-between gap-3 px-5 h-14 border-b shrink-0" style="border-color:var(--ui-line); background:var(--ui-panel)">
      <div class="flex items-center gap-2.5 min-w-0">
        <span id="projName" class="text-[13px] font-semibold truncate max-w-[260px]">Kompost-te — Levende vann</span>
        <span id="projTheme" class="eyebrow shrink-0"></span>
      </div>
      <div class="flex items-center gap-2.5 shrink-0">
        <div class="seg" id="ratioSeg">
          <button data-r="45" class="on">4:5</button>
          <button data-r="11">1:1</button>
          <button data-r="916">9:16</button>
        </div>
        <button id="btnExportAll" class="btn">Export all</button>
        <button id="btnExport" class="btn btn-primary flex items-center gap-2">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m0 0l-4-4m4 4l4-4"/></svg>
          Export slide PNG
        </button>
      </div>
    </header>

    <!-- stage -->
    <div id="stage" class="flex-1 overflow-hidden flex items-center justify-center p-6" style="background:var(--ui-bg); background-image: radial-gradient(#171d28 1px, transparent 1px); background-size: 22px 22px;">
      <div id="viewport" style="transform-origin:top left">
        <div id="artWrap" style="width:max-content; border-radius:6px; overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,.55)">
          <!-- built slide injected here -->
        </div>
      </div>
    </div>

    <!-- filmstrip -->
    <div class="border-t shrink-0" style="border-color:var(--ui-line); background:var(--ui-panel)">
      <div class="flex items-center gap-3 px-5 py-3">
        <div class="flex items-center gap-2 shrink-0">
          <span class="eyebrow">Slides</span>
        </div>
        <div id="filmstrip" class="flex items-center gap-2.5 overflow-x-auto flex-1 py-1"></div>
        <div class="flex items-center gap-1.5 shrink-0 pl-2 border-l" style="border-color:var(--ui-line)">
          <button id="btnDup"  class="btn btn-icon" title="Duplicate slide">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>
          </button>
          <button id="btnDel"  class="btn btn-icon" title="Delete slide">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m-8 0l1 13a1 1 0 001 1h6a1 1 0 001-1l1-13"/></svg>
          </button>
          <button id="btnAdd"  class="btn btn-icon" title="Add blank slide">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- ================= RIGHT · INSPECTOR ================= -->
  <aside class="w-[320px] shrink-0 overflow-y-auto border-l" style="border-color:var(--ui-line); background:var(--ui-panel)">
    <div class="p-5 space-y-6">

      <!-- Background -->
      <section class="space-y-3">
        <span class="eyebrow">Background</span>
        <div class="seg w-full" id="bgSeg" style="display:grid; grid-template-columns:repeat(4,1fr)">
          <button data-bg="photo">Photo</button>
          <button data-bg="navy">Navy</button>
          <button data-bg="cream">Cream</button>
          <button data-bg="white">White</button>
        </div>

        <div id="photoControls" class="space-y-3 pt-1">
          <div class="grid grid-cols-2 gap-2">
            <button id="btnUpload" class="btn flex items-center justify-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 16V4m0 0L8 8m4-4l4 4"/></svg>
              Upload
            </button>
            <button id="btnClearImg" class="btn">Remove image</button>
          </div>
          <input type="file" id="fileImg" accept="image/*" class="hidden" />
          <div class="flex gap-2">
            <input id="imgUrl" class="inp" placeholder="or paste image URL…" />
            <button id="btnSetUrl" class="btn shrink-0">Set</button>
          </div>
          <div id="presets" class="grid grid-cols-5 gap-1.5"></div>

          <div class="pt-1 space-y-2">
            <div class="flex items-center justify-between">
              <span class="lbl" style="margin:0">Tint overlay</span>
              <span id="tintPct" class="eyebrow">58%</span>
            </div>
            <div class="flex items-center gap-2.5">
              <div class="flex gap-1.5" id="tintSw">
                <button class="sw" data-c="#1C3A5C" style="background:#1C3A5C" title="Navy"></button>
                <button class="sw" data-c="#1A1A1A" style="background:#1A1A1A" title="Ink"></button>
                <button class="sw" data-c="#5A6270" style="background:#5A6270" title="Muted"></button>
              </div>
              <input id="tintColor" type="color" value="#1C3A5C" class="w-8 h-8" />
              <input id="tintOp" type="range" min="0" max="90" value="58" class="flex-1" />
            </div>
            <div class="flex items-center justify-between pt-1">
              <span class="lbl" style="margin:0">Text on photo</span>
              <div class="seg" id="photoTextSeg">
                <button data-t="light" class="on">Light</button>
                <button data-t="dark">Dark</button>
              </div>
            </div>
          </div>
        </div>
        <p id="solidNote" class="text-[11px] leading-relaxed hidden" style="color:var(--ui-faint)"></p>
      </section>

      <hr class="div" />

      <!-- Text content -->
      <section class="space-y-3">
        <span class="eyebrow">Text</span>
        <div>
          <label class="lbl">Category tag <span style="color:var(--ui-faint)">· top-right, mono caps</span></label>
          <input id="fTag" class="inp" />
        </div>
        <div>
          <label class="lbl">Title <span style="color:var(--ui-faint)">· Plex Sans Bold</span></label>
          <input id="fTitle" class="inp" />
        </div>
        <div>
          <label class="lbl">Subtitle <span style="color:var(--ui-faint)">· Plex Serif Italic</span></label>
          <input id="fSub" class="inp" />
        </div>
        <div>
          <label class="lbl">Body <span style="color:var(--ui-faint)">· Plex Serif · one line per row</span></label>
          <textarea id="fBody" class="inp" rows="3"></textarea>
        </div>
      </section>

      <hr class="div" />

      <!-- Text size -->
      <section class="space-y-2">
        <div class="flex items-center justify-between">
          <span class="eyebrow">Text size</span>
          <span id="tsPct" class="eyebrow">100%</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-[10px]" style="color:var(--ui-faint)">A</span>
          <input id="fScale" type="range" min="82" max="118" value="100" class="flex-1" />
          <span class="text-[15px]" style="color:var(--ui-faint)">A</span>
        </div>
        <p class="text-[11px] leading-relaxed" style="color:var(--ui-faint)">Scales title, subtitle and body together. Placement stays locked to the brand template.</p>
      </section>

      <hr class="div" />

      <!-- Logo -->
      <section class="space-y-3">
        <span class="eyebrow">Logo</span>
        <div class="flex items-center justify-between">
          <span class="lbl" style="margin:0">Variant</span>
          <div class="seg" id="logoSeg">
            <button data-v="white" class="on">White</button>
            <button data-v="dark">Charcoal</button>
          </div>
        </div>
        <label class="flex items-center gap-2 text-[12px] cursor-pointer" style="color:var(--ui-dim)">
          <input type="checkbox" id="wmChk" checked class="accent-[color:var(--gold)]" /> Show “Verminord” wordmark
        </label>
        <div class="grid grid-cols-2 gap-2">
          <button id="btnLogoWhite" class="btn">Upload white SVG</button>
          <button id="btnLogoDark" class="btn">Upload dark SVG</button>
        </div>
        <input type="file" id="fileLogoWhite" accept=".svg,image/svg+xml" class="hidden" />
        <input type="file" id="fileLogoDark" accept=".svg,image/svg+xml" class="hidden" />
        <div class="flex items-center justify-between">
          <p id="logoNote" class="text-[11px]" style="color:var(--ui-faint)">Using built-in mark.</p>
          <button id="btnLogoReset" class="text-[11px] underline" style="color:var(--ui-faint)">Reset</button>
        </div>
      </section>

    </div>
  </aside>
</div>

<div id="toast" class="toast"></div>

<script>
"use strict";

/* ============================================================
   IMAGE PRESETS (nature / soil textures, CORS-enabled)
   ============================================================ */
const PRESETS = [
  "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1400&q=80",
  "https://images.unsplash.com/photo-1416879595882-3373a0480b5b?auto=format&fit=crop&w=1400&q=80",
  "https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&w=1400&q=80",
  "https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&w=1400&q=80",
  "https://images.unsplash.com/photo-1518495973542-4542c06a5843?auto=format&fit=crop&w=1400&q=80",
];

/* ============================================================
   THEME → visual mapping (brand-locked, max 3 colours each)
   photo : navy tint + white text + gold accent  (strongest triad)
   navy  : navy bg + cream text + gold accent     (strongest triad)
   cream : cream bg + navy text + ink body        (NO gold text — brand rule)
   white : white bg + navy text + gold accent     (strongest triad)
   ============================================================ */
const C = { navy:'#1C3A5C', gold:'#B8993A', cream:'#F6F2EA', white:'#FFFFFF', ink:'#1A1A1A', muted:'#5A6270' };

function themeStyle(slide){
  const t = slide.bgType;
  if (t === 'photo'){
    const light = slide.photoText !== 'dark';
    return {
      solid: null,
      title: light ? C.white : C.ink,
      body:  light ? 'rgba(255,255,255,0.95)' : C.ink,
      accent: light ? C.gold : C.navy,   // tag + site
      logo: light ? 'white' : 'dark',
    };
  }
  if (t === 'navy')  return { solid:C.navy,  title:C.cream, body:'rgba(246,242,234,0.9)', accent:C.gold,  logo:'white' };
  if (t === 'cream') return { solid:C.cream, title:C.navy,  body:C.ink,                   accent:C.navy,  logo:'dark'  };
  return               { solid:C.white, title:C.navy,  body:C.navy,                  accent:C.gold,  logo:'dark'  }; // white
}

/* ============================================================
   DEFAULT LOGO MARK  (faithful worm; swappable via upload)
   ============================================================ */
function defaultMark(color){
  return `<svg viewBox="0 0 200 60" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="19" cy="35" r="10"/><circle cx="16" cy="32" r="2.4" fill="${color}" stroke="none"/>
    <path d="M31 44 C44 16 66 16 78 44 C90 18 110 18 120 42 C130 22 146 22 154 40 C161 26 173 26 181 40"/>
  </svg>`;
}

/* ============================================================
   CONTENT LIBRARY  —  Verminord's real carousels
   Compact form → expanded into full slide objects on load.
   theme: photo|navy|cream|white applied to the whole carousel.

function expandTemplate(tpl){
  return tpl.slides.map(s => {
    const isPhoto = tpl.theme === 'photo';
    return {
      bgType: tpl.theme,                       // photo|navy|cream|white
      img: isPhoto ? (s.img || '') : '',

      photoText: 'light',
      tag: s.tag || '',

/* ============================================================
   DOM SHORTCUTS
   ============================================================ */
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ============================================================
   BUILD A SLIDE  (single source of truth for preview / thumb / export)
   ============================================================ */
function buildSlide(slide, ratio){
  const st = themeStyle(slide);
  const el = document.createElement('div');
  el.className = 'ig r' + ratio;
  if (st.solid) el.style.background = st.solid;

  // photo + tint
  if (slide.bgType === 'photo'){
    if (slide.img){
      const img = document.createElement('img');
      img.className = 'ig-photo';
      img.crossOrigin = 'anonymous';
      img.src = slide.img;
      el.appendChild(img);
    } else {
      el.style.background = C.navy;
    }
    const tint = document.createElement('div');
    tint.className = 'ig-tint';
    tint.style.background = slide.tint;
    tint.style.opacity = slide.op/100;
    el.appendChild(tint);
  }

  // logo
  const lv = slide.logoVariant || st.logo;
  const logo = document.createElement('div');
  logo.className = 'ig-logo';
  const color = lv === 'white' ? C.white : C.ink;
  const custom = lv === 'white' ? project.logo.customWhite : project.logo.customDark;
  if (custom){
    logo.innerHTML = custom;
    const svg = logo.querySelector('svg');
    if (svg){ svg.style.height='42px'; svg.style.width='auto'; }
  } else {
    logo.innerHTML = defaultMark(color);
    if (project.logo.wordmark){
      const wm = document.createElement('div');
      wm.className = 'wm'; wm.style.color = color; wm.textContent = 'Verminord';
      logo.appendChild(wm);
    }
  }
  el.appendChild(logo);

  // tag
  if (slide.tag){
    const tag = document.createElement('div');
    tag.className = 'ig-tag'; tag.style.color = st.accent; tag.textContent = slide.tag;
    el.appendChild(tag);
  }

  // center block
  const center = document.createElement('div');
  center.className = 'ig-center';
  center.style.setProperty('--ts', slide.scale/100);
  if (slide.title){
    const h = document.createElement('div'); h.className='ig-title'; h.style.color=st.title; h.textContent=slide.title; center.appendChild(h);
  }
  if (slide.sub){
    const s = document.createElement('div'); s.className='ig-subtitle'; s.style.color=st.title; s.textContent=slide.sub; center.appendChild(s);
  }
  if (slide.body){
    const b = document.createElement('div'); b.className='ig-body'; b.style.color=st.body;
    b.innerHTML = slide.body.split('\n').map(l => esc(l) || '&nbsp;').join('<br>');
    center.appendChild(b);
  }
  el.appendChild(center);

  // site
  const site = document.createElement('div');
  site.className = 'ig-site'; site.style.color = st.accent; site.textContent = 'VERMINORD.COM';
  el.appendChild(site);

  return el;
}

/* ============================================================
   RENDER — main preview
   ============================================================ */
function renderPreview(){
  const wrap = $('artWrap');
  wrap.innerHTML = '';
  wrap.appendChild(buildSlide(project.slides[project.current], project.ratio));
  fit();
}
function fit(){
  const stage = $('stage');
  const w = 1080, h = project.ratio==='45'?1350 : project.ratio==='11'?1080 : 1920;
  const scale = Math.min((stage.clientWidth-56)/w, (stage.clientHeight-56)/h, 0.9);
  const vp = $('viewport');
  vp.style.transform = `scale(${scale})`;
  vp.style.width = w*scale+'px';
  vp.style.height = h*scale+'px';
}
window.addEventListener('resize', fit);

/* ============================================================
   RENDER — filmstrip thumbnails (live mini-renders)
   ============================================================ */
function renderFilmstrip(){
  const fs = $('filmstrip'); fs.innerHTML = '';
  const th = 92; // thumb height px
  const w = 1080, h = project.ratio==='45'?1350 : project.ratio==='11'?1080 : 1920;
  const scale = th / h;
  project.slides.forEach((slide, i) => {
    const box = document.createElement('button');
    box.style.cssText = `position:relative; flex:0 0 auto; width:${Math.round(w*scale)}px; height:${th}px; border-radius:7px; overflow:hidden; border:2px solid ${i===project.current?'var(--gold)':'var(--ui-line2)'}; background:#000; cursor:pointer`;
    const inner = document.createElement('div');
    inner.style.cssText = `position:absolute; top:0; left:0; width:${w}px; height:${h}px; transform:scale(${scale}); transform-origin:top left`;
    inner.appendChild(buildSlide(slide, project.ratio));
    box.appendChild(inner);
    const num = document.createElement('div');
    num.textContent = i+1;
    num.style.cssText = 'position:absolute; top:3px; left:4px; font-size:9px; font-weight:700; color:#fff; background:rgba(0,0,0,.55); border-radius:4px; padding:0 4px; font-family:IBM Plex Mono,monospace';
    box.appendChild(num);
    box.onclick = () => { project.current = i; renderAll(); };
    fs.appendChild(box);
  });
}

/* ============================================================
   RENDER — inspector controls (reflect current slide)
   ============================================================ */
function renderControls(){
  const s = project.slides[project.current];
  // background segmented
  document.querySelectorAll('#bgSeg button').forEach(b => b.classList.toggle('on', b.dataset.bg === s.bgType));
  const isPhoto = s.bgType === 'photo';
  $('photoControls').classList.toggle('hidden', !isPhoto);
  $('solidNote').classList.toggle('hidden', isPhoto);
  if (!isPhoto){
    const notes = {
      navy:'Navy + Cream + Gold — the strongest brand triad. White logo.',
      cream:'Cream + Navy + Ink. No gold text on cream (brand rule). Charcoal logo.',
      white:'White + Navy + Gold triad. Charcoal logo.',
    };
    $('solidNote').textContent = notes[s.bgType] || '';
  }
  // photo controls
  $('imgUrl').value = (isPhoto && /^https?:/.test(s.img)) ? s.img : '';
  $('tintColor').value = s.tint;
  $('tintOp').value = s.op; $('tintPct').textContent = s.op + '%';
  document.querySelectorAll('#tintSw .sw').forEach(b => b.classList.toggle('on', b.dataset.c.toLowerCase()===s.tint.toLowerCase()));
  document.querySelectorAll('#photoTextSeg button').forEach(b => b.classList.toggle('on', b.dataset.t === s.photoText));
  document.querySelectorAll('#presets .sw2').forEach(b => b.classList.toggle('on', b.dataset.u === s.img));
  // text
  $('fTag').value = s.tag; $('fTitle').value = s.title; $('fSub').value = s.sub; $('fBody').value = s.body;
  // scale
  $('fScale').value = s.scale; $('tsPct').textContent = s.scale + '%';
  // logo
  const st = themeStyle(s);
  const lv = s.logoVariant || st.logo;
  document.querySelectorAll('#logoSeg button').forEach(b => b.classList.toggle('on', b.dataset.v === lv));
  $('wmChk').checked = project.logo.wordmark;
  const has = project.logo.customWhite || project.logo.customDark;
  $('logoNote').textContent = has ? 'Using uploaded logo.' : 'Using built-in mark.';
}

function renderHeader(){
  const tpl = LIB[project.activeTpl];
  $('projName').textContent = tpl ? tpl.name : 'Custom';
  $('projTheme').textContent = (project.slides[project.current]||{}).bgType || '';
}

function renderAll(){ renderPreview(); renderFilmstrip(); renderControls(); renderHeader(); }

/* ============================================================
   TEMPLATE LIBRARY (left)
   ============================================================ */
const CATS = ['ALL', ...Array.from(new Set(LIB.map(t=>t.cat)))];
let activeCat = 'ALL', searchQ = '';

function renderChips(){
  const wrap = $('catChips'); wrap.innerHTML='';
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'chip' + (c===activeCat?' on':'');
    b.textContent = c;
    b.onclick = () => { activeCat = c; renderTplList(); };
    wrap.appendChild(b);
  });
}
function renderTplList(){
  renderChips();
  const list = $('tplList'); list.innerHTML='';
  const q = searchQ.toLowerCase();
  const items = LIB.map((t,i)=>({t,i})).filter(({t}) =>
    (activeCat==='ALL' || t.cat===activeCat) &&
    (!q || t.name.toLowerCase().includes(q) || t.slides.some(s => (s.title+s.sub+s.body).toLowerCase().includes(q)))
  );
  $('tplCount').textContent = items.length + (items.length===1?' set':' sets');
  items.forEach(({t,i}) => {
    const b = document.createElement('button');
    b.className = 'tpl' + (i===project.activeTpl?' on':'');
    const dot = t.theme==='photo' ? '#7d8794' : t.theme==='navy' ? C.navy : t.theme==='cream' ? C.cream : '#fff';
    b.innerHTML = `
      <div class="flex items-center justify-between gap-2">
        <div class="text-[12.5px] font-semibold leading-snug pr-1">${esc(t.name)}</div>
        <span style="width:12px;height:12px;border-radius:50%;flex:0 0 auto;background:${dot};border:1px solid rgba(255,255,255,.18)"></span>
      </div>
      <div class="flex items-center gap-2 mt-1.5">
        <span class="eyebrow">${esc(t.cat)}</span>
        <span class="eyebrow" style="color:var(--ui-faint)">· ${t.slides.length} slides · ${t.theme}</span>
      </div>`;
    b.onclick = () => loadTemplate(i);
    list.appendChild(b);
  });
}
function loadTemplate(i){
  project.slides = expandTemplate(LIB[i]);
  project.current = 0;
  project.activeTpl = i;
  renderTplList();
  renderAll();
  toast('Loaded “' + LIB[i].name + '”');
}

/* ============================================================
   INSPECTOR WIRING
   ============================================================ */
const cur = () => project.slides[project.current];

// background type
document.querySelectorAll('#bgSeg button').forEach(b => b.onclick = () => {
  const s = cur();
  s.bgType = b.dataset.bg;
  s.logoVariant = null;         // reset to theme-auto on bg change
  if (s.bgType==='photo' && !s.img){ s.img = PRESETS[0]; }
  renderAll();
});

// image upload (local disk)
$('btnUpload').onclick = () => $('fileImg').click();
$('fileImg').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const rd = new FileReader();
  rd.onload = () => { const s=cur(); s.bgType='photo'; s.img = rd.result; renderAll(); toast('Image added'); };
  rd.readAsDataURL(f);
  e.target.value='';
};
$('btnClearImg').onclick = () => { const s=cur(); s.img=''; renderAll(); };
$('btnSetUrl').onclick = setUrl;
$('imgUrl').addEventListener('keydown', e => { if (e.key==='Enter') setUrl(); });
function setUrl(){ const u=$('imgUrl').value.trim(); if(!u) return; const s=cur(); s.bgType='photo'; s.img=u; renderAll(); }

// presets
const pr = $('presets');
PRESETS.forEach(u => {
  const b = document.createElement('button');
  b.className='sw2';
  b.dataset.u=u;
  b.style.cssText='height:34px;border-radius:6px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:#0b0f16';
  b.innerHTML = `<img src="${u.replace('w=1400','w=200')}" style="width:100%;height:100%;object-fit:cover" loading="lazy">`;
  b.onclick = () => { const s=cur(); s.bgType='photo'; s.img=u; renderAll(); };
  pr.appendChild(b);
});
// mark active preset border via CSS class handling in renderControls
const style2 = document.createElement('style');
style2.textContent = '.sw2.on{border-color:var(--gold)!important}';
document.head.appendChild(style2);

// tint
document.querySelectorAll('#tintSw .sw').forEach(b => b.onclick = () => { cur().tint=b.dataset.c; renderPreview(); renderFilmstrip(); renderControls(); });
$('tintColor').oninput = () => { cur().tint=$('tintColor').value; renderPreview(); renderFilmstrip(); renderControls(); };
$('tintOp').oninput = () => { cur().op=+$('tintOp').value; $('tintPct').textContent=$('tintOp').value+'%'; renderPreview(); renderFilmstrip(); };
document.querySelectorAll('#photoTextSeg button').forEach(b => b.onclick = () => { cur().photoText=b.dataset.t; renderAll(); });

// text fields
$('fTag').oninput   = () => { cur().tag=$('fTag').value; renderPreview(); renderFilmstrip(); };
$('fTitle').oninput = () => { cur().title=$('fTitle').value; renderPreview(); renderFilmstrip(); };
$('fSub').oninput   = () => { cur().sub=$('fSub').value; renderPreview(); renderFilmstrip(); };
$('fBody').oninput  = () => { cur().body=$('fBody').value; renderPreview(); renderFilmstrip(); };

// text scale
$('fScale').oninput = () => { cur().scale=+$('fScale').value; $('tsPct').textContent=$('fScale').value+'%'; renderPreview(); renderFilmstrip(); };

// logo variant + wordmark
document.querySelectorAll('#logoSeg button').forEach(b => b.onclick = () => { cur().logoVariant=b.dataset.v; renderAll(); });
$('wmChk').onchange = () => { project.logo.wordmark=$('wmChk').checked; renderPreview(); renderFilmstrip(); };
$('btnLogoWhite').onclick = () => $('fileLogoWhite').click();
$('btnLogoDark').onclick  = () => $('fileLogoDark').click();
$('fileLogoWhite').onchange = e => readSvg(e, 'customWhite', 'White');
$('fileLogoDark').onchange  = e => readSvg(e, 'customDark', 'Charcoal');
function readSvg(e, key, label){
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ project.logo[key]=sanitizeSvg(rd.result); renderAll(); toast(label+' logo uploaded'); };
  rd.readAsText(f);
  e.target.value='';
}
function sanitizeSvg(str){
  // keep only the <svg>…</svg>, strip scripts/handlers (local tool, light guard)
  const m = str.match(/<svg[\s\S]*<\/svg>/i);
  let svg = m ? m[0] : str;
  svg = svg.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/on\w+="[^"]*"/gi,'');
  return svg;
}
$('btnLogoReset').onclick = () => { project.logo.customWhite=null; project.logo.customDark=null; renderAll(); toast('Logo reset'); };

// ratio
document.querySelectorAll('#ratioSeg button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#ratioSeg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  project.ratio = b.dataset.r;
  renderAll();
});

// slide management
$('btnAdd').onclick = () => {
  const base = cur();
  project.slides.splice(project.current+1, 0, { ...JSON.parse(JSON.stringify(base)), tag:base.tag, title:'New title', sub:'ny linje.', body:'Rediger teksten her.' });
  project.current++; renderAll();
};
$('btnDup').onclick = () => {
  project.slides.splice(project.current+1, 0, JSON.parse(JSON.stringify(cur())));
  project.current++; renderAll(); toast('Slide duplicated');
};
$('btnDel').onclick = () => {
  if (project.slides.length<=1){ toast('Keep at least one slide'); return; }
  project.slides.splice(project.current,1);
  project.current = Math.max(0, project.current-1);
  renderAll();
};

// keyboard nav
document.addEventListener('keydown', e => {
  if (/input|textarea/i.test(document.activeElement.tagName)) return;
  if (e.key==='ArrowRight' && project.current<project.slides.length-1){ project.current++; renderAll(); }
  if (e.key==='ArrowLeft'  && project.current>0){ project.current--; renderAll(); }
});

/* ============================================================
   EXPORT ENGINE  (html2canvas, 2× hi-res)
   ============================================================ */
async function waitImg(el){
  const img = el.querySelector('img.ig-photo');
  if (!img || !img.getAttribute('src')) return;
  if (img.complete && img.naturalWidth) return;
  await new Promise(res => { img.onload=res; img.onerror=res; });
}
async function capture(slide){
  await document.fonts.ready;
  const node = buildSlide(slide, project.ratio);
  const holder = document.createElement('div');
  holder.style.cssText = 'position:fixed;left:-20000px;top:0;';
  holder.appendChild(node);
  document.body.appendChild(holder);
  try {
    await waitImg(node);
    await new Promise(r => setTimeout(r, 60));
    return await html2canvas(node, { scale:2, useCORS:true, backgroundColor:'#1C3A5C', logging:false, width:1080, height: project.ratio==='45'?1350:project.ratio==='11'?1080:1920 });
  } finally { holder.remove(); }
}
function download(canvas, name){
  const a=document.createElement('a'); a.download=name; a.href=canvas.toDataURL('image/png'); a.click();
}
$('btnExport').onclick = async () => {
  const btn=$('btnExport'); const label=btn.innerHTML; btn.style.opacity=.6; btn.disabled=true;
  try {
    const cnv = await capture(cur());
    download(cnv, `verminord-slide-${project.current+1}.png`);
    toast('Exported slide ' + (project.current+1));
  } catch(err){ toast('Export failed — try a preset image'); console.error(err); }
  finally { btn.style.opacity=1; btn.disabled=false; btn.innerHTML=label; }
};
$('btnExportAll').onclick = async () => {
  const btn=$('btnExportAll'); btn.disabled=true;
  const name = (LIB[project.activeTpl]?LIB[project.activeTpl].name:'verminord').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  try {
    for (let i=0;i<project.slides.length;i++){
      btn.textContent = `Exporting ${i+1}/${project.slides.length}…`;
      const cnv = await capture(project.slides[i]);
      download(cnv, `${name}-${String(i+1).padStart(2,'0')}.png`);
      await new Promise(r=>setTimeout(r,250));
    }
    toast('Exported all slides');
  } catch(err){ toast('Export failed'); console.error(err); }
  finally { btn.disabled=false; btn.textContent='Export all'; }
};

/* ============================================================
   TOAST
   ============================================================ */
let toastT;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1900); }

// search
$('tplSearch').oninput = e => { searchQ = e.target.value; renderTplList(); };

/* ============================================================
   BOOT
   ============================================================ */
project.slides = expandTemplate(LIB[0]);
renderTplList();
renderAll();
document.fonts.ready.then(renderAll);
</script>
</body>
