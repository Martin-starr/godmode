<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verminord · Carousel Studio</title>

<!-- ============================================================
     LIBRARIES
     ============================================================ -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<!-- ============================================================
     BRAND TYPOGRAPHY  —  IBM Plex family
       · IBM Plex Sans  700  → bold main title
       · IBM Plex Serif italic → serif subtitle line
       · IBM Plex Serif 400  → body text
       · IBM Plex Mono  300/400 → tag + VERMINORD.COM (ALL CAPS, tracked)
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet" />

<style>
  /* ==========================================================
     BRAND TOKENS  (from the Verminord brand guide)
     ========================================================== */
  :root {
    --navy:  #1C3A5C;   /* Primær — headers, cover */
    --gold:  #B8993A;   /* Aksent — linjer, labels */
    --cream: #F6F2EA;   /* Flate — bakgrunn, bokser */
    --white: #FFFFFF;   /* Innholdsflate */
    --ink:   #1A1A1A;   /* Brødtekst på lys bg */
    --muted: #5A6270;   /* Sekundær — footer */

    /* editor chrome (dark studio UI — not part of exported art) */
    --ui-bg:     #0e1116;
    --ui-panel:  #141922;
    --ui-panel2: #10151d;
    --ui-line:   #212836;
    --ui-line2:  #2c3444;
    --ui-text:   #e6ebf2;
    --ui-dim:    #8b97a8;
    --ui-faint:  #5d6879;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    background: var(--ui-bg);
    color: var(--ui-text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #263042; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #33415a; }

  .eyebrow { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:var(--ui-faint); }
  .lbl { font-size:11.5px; font-weight:500; color:var(--ui-dim); display:block; margin-bottom:6px; }
  .inp { width:100%; background:var(--ui-panel2); border:1px solid var(--ui-line); border-radius:9px; padding:9px 12px; font-size:13px; font-family:'IBM Plex Sans',sans-serif; color:var(--ui-text); outline:none; transition:border-color .15s, background .15s; }
  .inp:focus { border-color:#4d6ea0; background:#121824; }
  textarea.inp { resize:vertical; min-height:92px; line-height:1.55; }

  .btn { font-size:12px; font-weight:600; border-radius:9px; padding:8px 13px; border:1px solid var(--ui-line2); color:var(--ui-dim); background:var(--ui-panel2); cursor:pointer; transition:all .13s; white-space:nowrap; }
  .btn:hover:not(:disabled) { color:var(--ui-text); border-color:#3d4c66; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn-primary { background:var(--gold); color:#1a1403; border-color:var(--gold); font-weight:700; }
  .btn-primary:hover:not(:disabled) { background:#cbab48; border-color:#cbab48; color:#1a1403; }
  .btn-icon { padding:7px; display:inline-flex; align-items:center; justify-content:center; }

  .seg { display:inline-flex; background:var(--ui-panel2); border:1px solid var(--ui-line); border-radius:10px; padding:3px; gap:2px; }
  .seg > button { font-size:11.5px; font-weight:600; padding:6px 12px; border-radius:7px; color:var(--ui-dim); cursor:pointer; border:none; background:transparent; transition:all .12s; }
  .seg > button.on { background:#263149; color:#fff; }

  .sw { width:26px; height:26px; border-radius:7px; border:2px solid transparent; cursor:pointer; transition:transform .1s,border-color .1s; }
  .sw:hover { transform:scale(1.1); }
  .sw.on { border-color:#fff; }

  .chip { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; padding:5px 10px; border-radius:999px; border:1px solid var(--ui-line2); color:var(--ui-dim); cursor:pointer; white-space:nowrap; transition:all .12s; }
  .chip:hover { color:var(--ui-text); border-color:#3d4c66; }
  .chip.on { background:var(--ui-text); color:var(--ui-bg); border-color:var(--ui-text); }

  .tpl { text-align:left; width:100%; background:var(--ui-panel2); border:1px solid var(--ui-line); border-radius:11px; padding:11px 13px; cursor:pointer; transition:all .14s; }
  .tpl:hover { border-color:#3d4c66; background:#131a26; }
  .tpl.on { border-color:var(--gold); }

  hr.div { border:none; border-top:1px solid var(--ui-line); margin:0; }

  input[type=range] { -webkit-appearance:none; appearance:none; height:4px; border-radius:3px; background:var(--ui-line2); outline:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--gold); cursor:pointer; border:2px solid #1a1f2b; }
  input[type=range]::-moz-range-thumb { width:16px; height:16px; border-radius:50%; background:var(--gold); cursor:pointer; border:2px solid #1a1f2b; }
  input[type=color] { -webkit-appearance:none; appearance:none; border:1px solid var(--ui-line); border-radius:8px; background:transparent; cursor:pointer; padding:2px; }
  input[type=color]::-webkit-color-swatch-wrapper { padding:0; }
  input[type=color]::-webkit-color-swatch { border:none; border-radius:6px; }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a2330; border:1px solid var(--ui-line2); color:var(--ui-text); padding:10px 16px; border-radius:10px; font-size:12.5px; font-weight:500; opacity:0; pointer-events:none; transition:all .25s; z-index:100; box-shadow:0 12px 40px rgba(0,0,0,.5); max-width:420px; text-align:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.warn { border-color:#7a5a1f; }

  /* ==========================================================
     THE SLIDE ARTBOARD — 1080-based, brand-locked
     No gradients. No shadows on the art (brand rule).
     ========================================================== */
  .ig { position:relative; width:1080px; overflow:hidden; flex-shrink:0; background:var(--navy); font-family:'IBM Plex Sans',sans-serif; }
  .ig.r45 { height:1350px; }
  .ig.r11 { height:1080px; }
  .ig.r916 { height:1920px; }
  .ig.overflowing { outline:3px solid #d9534f; outline-offset:-3px; }

  .ig-photo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .ig-tint  { position:absolute; inset:0; }

  .ig-logo { position:absolute; top:84px; left:84px; display:flex; flex-direction:column; gap:8px; }
  .ig-logo svg { height:42px; width:auto; display:block; }
  .ig-logo .wm { font-family:'IBM Plex Sans',sans-serif; font-weight:500; font-size:40px; line-height:1; letter-spacing:.005em; }

  .ig-tag { position:absolute; top:96px; right:84px; font-family:'IBM Plex Mono',monospace; font-weight:400; font-size:21px; letter-spacing:0.34em; text-transform:uppercase; text-align:right; max-width:520px; line-height:1.7; }

  /* Optically-centred content, biased just below the true middle
     (top padding > bottom), guarded against the logo/footer bands. */
  .ig-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:186px 112px 150px; --ts:1; }
  .ig-title    { font-family:'IBM Plex Sans',sans-serif; font-weight:700; font-size:calc(92px * var(--ts)); line-height:1.0; letter-spacing:-0.014em; }
  .ig-subtitle { font-family:'IBM Plex Serif',serif; font-style:italic; font-weight:500; font-size:calc(64px * var(--ts)); line-height:1.08; margin-top:14px; }
  .ig-body     { font-family:'IBM Plex Serif',serif; font-weight:400; font-size:calc(30px * var(--ts)); line-height:1.5; margin-top:38px; max-width:820px; }

  .ig-site { position:absolute; bottom:74px; left:0; right:0; text-align:center; font-family:'IBM Plex Mono',monospace; font-weight:400; font-size:20px; letter-spacing:0.4em; text-transform:uppercase; text-indent:0.4em; }
</style>
</head>

<body>
<div class="flex h-screen">

  <!-- ================= LEFT · CONTENT LIBRARY ================= -->
  <aside class="w-[288px] shrink-0 flex flex-col border-r" style="border-color:var(--ui-line); background:var(--ui-panel)">
    <div class="px-5 pt-5 pb-4 border-b" style="border-color:var(--ui-line)">
      <div class="flex items-center gap-2.5">
        <svg viewBox="0 0 200 60" class="h-6 w-auto" fill="none" stroke="#B8993A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="19" cy="35" r="10"/><circle cx="16" cy="32" r="2.4" fill="#B8993A" stroke="none"/>
          <path d="M31 44 C44 16 66 16 78 44 C90 18 110 18 120 42 C130 22 146 22 154 40 C161 26 173 26 181 40"/>
        </svg>
        <div>
          <div class="text-[15px] font-bold tracking-tight leading-none">Verminord</div>
          <div class="eyebrow mt-1">Carousel Studio</div>
        </div>
      </div>
    </div>

    <div class="px-5 pt-4 pb-3 space-y-3 border-b" style="border-color:var(--ui-line)">
      <input id="tplSearch" class="inp" placeholder="Search carousels…" />
      <div id="catChips" class="flex flex-wrap gap-1.5"></div>
    </div>

    <div class="px-5 pt-2 pb-1 flex items-center justify-between">
      <span class="eyebrow">Templates</span>
      <span id="tplCount" class="eyebrow"></span>
    </div>
    <div id="tplList" class="flex-1 overflow-y-auto px-5 pb-5 pt-1 space-y-2"></div>

    <div class="px-5 py-3 border-t grid grid-cols-2 gap-2" style="border-color:var(--ui-line)">
      <button id="btnSave" class="btn">Save .json</button>
      <button id="btnLoad" class="btn">Load .json</button>
      <input type="file" id="fileProject" accept="application/json,.json" class="hidden" />
    </div>
  </aside>

  <!-- ================= CENTER · CANVAS ================= -->
  <main class="flex-1 flex flex-col min-w-0">
    <header class="flex items-center justify-between gap-3 px-5 h-14 border-b shrink-0" style="border-color:var(--ui-line); background:var(--ui-panel)">
      <div class="flex items-center gap-2.5 min-w-0">
        <span id="projName" class="text-[13px] font-semibold truncate max-w-[220px]">Kompost-te — Levende vann</span>
        <span id="projTheme" class="eyebrow shrink-0"></span>
        <span id="dirtyDot" class="w-1.5 h-1.5 rounded-full shrink-0 hidden" style="background:var(--gold)" title="Unsaved edits"></span>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button id="btnUndo" class="btn btn-icon" title="Undo (Ctrl/Cmd+Z)">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 14L4 9l5-5M4 9h11a5 5 0 010 10h-3"/></svg>
        </button>
        <button id="btnRedo" class="btn btn-icon" title="Redo (Ctrl/Cmd+Shift+Z)">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 14l5-5-5-5M20 9H9a5 5 0 000 10h3"/></svg>
        </button>
        <div class="seg" id="ratioSeg">
          <button data-r="45" class="on">4:5</button>
          <button data-r="11">1:1</button>
          <button data-r="916">9:16</button>
        </div>
        <div class="seg" id="fmtSeg" title="Export format — Auto uses JPG for photos, PNG for solids">
          <button data-f="auto" class="on">Auto</button>
          <button data-f="png">PNG</button>
          <button data-f="jpg">JPG</button>
        </div>
        <button id="btnExportAll" class="btn">Export ZIP</button>
        <button id="btnExport" class="btn btn-primary flex items-center gap-2">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m0 0l-4-4m4 4l4-4"/></svg>
          Export slide
        </button>
      </div>
    </header>

    <div id="stage" class="flex-1 overflow-hidden flex items-center justify-center p-6" style="background:var(--ui-bg); background-image:radial-gradient(#171d28 1px, transparent 1px); background-size:22px 22px;">
      <div id="viewport" style="transform-origin:top left">
        <div id="artWrap" style="width:max-content; border-radius:6px; overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,.55)"></div>
      </div>
    </div>

    <div class="border-t shrink-0" style="border-color:var(--ui-line); background:var(--ui-panel)">
      <div class="flex items-center gap-3 px-5 py-3">
        <div class="flex items-center gap-2 shrink-0">
          <span class="eyebrow">Slides</span>
          <span id="slideCount" class="eyebrow" style="color:var(--ui-faint)"></span>
        </div>
        <div id="filmstrip" class="flex items-center gap-2.5 overflow-x-auto flex-1 py-1"></div>
        <div class="flex items-center gap-1.5 shrink-0 pl-2 border-l" style="border-color:var(--ui-line)">
          <button id="btnMoveL" class="btn btn-icon" title="Move slide left (Alt+←)">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button id="btnMoveR" class="btn btn-icon" title="Move slide right (Alt+→)">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </button>
          <span class="w-px h-5" style="background:var(--ui-line)"></span>
          <button id="btnDup" class="btn btn-icon" title="Duplicate slide (Ctrl/Cmd+D)">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>
          </button>
          <button id="btnDel" class="btn btn-icon" title="Delete slide">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m-8 0l1 13a1 1 0 001 1h6a1 1 0 001-1l1-13"/></svg>
          </button>
          <button id="btnAdd" class="btn btn-icon" title="Add blank slide">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- ================= RIGHT · INSPECTOR ================= -->
  <aside class="w-[320px] shrink-0 overflow-y-auto border-l" style="border-color:var(--ui-line); background:var(--ui-panel)">
    <div class="p-5 space-y-6">

      <section class="space-y-3">
        <span class="eyebrow">Background</span>
        <div class="seg w-full" id="bgSeg" style="display:grid; grid-template-columns:repeat(4,1fr)">
          <button data-bg="photo">Photo</button>
          <button data-bg="navy">Navy</button>
          <button data-bg="cream">Cream</button>
          <button data-bg="white">White</button>
        </div>

        <div id="photoControls" class="space-y-3 pt-1">
          <div class="grid grid-cols-2 gap-2">
            <button id="btnUpload" class="btn flex items-center justify-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 16V4m0 0L8 8m4-4l4 4"/></svg>
              Upload
            </button>
            <button id="btnClearImg" class="btn">Remove image</button>
          </div>
          <input type="file" id="fileImg" accept="image/*" class="hidden" />
          <div class="flex gap-2">
            <input id="imgUrl" class="inp" placeholder="or paste image URL…" />
            <button id="btnSetUrl" class="btn shrink-0">Set</button>
          </div>
          <div id="presets" class="grid grid-cols-5 gap-1.5"></div>

          <div class="pt-1 space-y-2">
            <div class="flex items-center justify-between">
              <span class="lbl" style="margin:0">Tint overlay</span>
              <span id="tintPct" class="eyebrow">58%</span>
            </div>
            <div class="flex items-center gap-2.5">
              <div class="flex gap-1.5" id="tintSw">
                <button class="sw" data-c="#1C3A5C" style="background:#1C3A5C" title="Navy"></button>
                <button class="sw" data-c="#1A1A1A" style="background:#1A1A1A" title="Ink"></button>
                <button class="sw" data-c="#5A6270" style="background:#5A6270" title="Muted"></button>
              </div>
              <input id="tintColor" type="color" value="#1C3A5C" class="w-8 h-8" title="Custom tint" />
              <input id="tintOp" type="range" min="0" max="90" value="58" class="flex-1" />
            </div>
            <div class="flex items-center justify-between pt-1">
              <span class="lbl" style="margin:0">Text on photo</span>
              <div class="seg" id="photoTextSeg">
                <button data-t="light" class="on">Light</button>
                <button data-t="dark">Dark</button>
              </div>
            </div>
          </div>
        </div>
        <p id="solidNote" class="text-[11px] leading-relaxed hidden" style="color:var(--ui-faint)"></p>
      </section>

      <hr class="div" />

      <section class="space-y-3">
        <span class="eyebrow">Text</span>
        <div>
          <label class="lbl">Category tag <span style="color:var(--ui-faint)">· top-right, mono caps</span></label>
          <input id="fTag" class="inp" />
        </div>
        <div>
          <label class="lbl">Title <span style="color:var(--ui-faint)">· Plex Sans Bold</span></label>
          <input id="fTitle" class="inp" />
        </div>
        <div>
          <label class="lbl">Subtitle <span style="color:var(--ui-faint)">· Plex Serif Italic</span></label>
          <input id="fSub" class="inp" />
        </div>
        <div>
          <label class="lbl">Body <span style="color:var(--ui-faint)">· Plex Serif · one line per row</span></label>
          <textarea id="fBody" class="inp" rows="3"></textarea>
        </div>
        <div>
          <label class="lbl">Alt text <span style="color:var(--ui-faint)">· accessibility · per slide</span></label>
          <textarea id="fAlt" class="inp" rows="2" style="min-height:56px" placeholder="Describe this slide for screen readers…"></textarea>
        </div>
      </section>

      <hr class="div" />

      <section class="space-y-2">
        <div class="flex items-center justify-between">
          <span class="eyebrow">Text size</span>
          <span id="tsPct" class="eyebrow">100%</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-[10px]" style="color:var(--ui-faint)">A</span>
          <input id="fScale" type="range" min="82" max="118" value="100" class="flex-1" />
          <span class="text-[15px]" style="color:var(--ui-faint)">A</span>
        </div>
        <p class="text-[11px] leading-relaxed" style="color:var(--ui-faint)">Scales title, subtitle and body together. Placement stays locked to the brand template.</p>
      </section>

      <hr class="div" />

      <section class="space-y-3">
        <span class="eyebrow">Logo</span>
        <div class="flex items-center justify-between">
          <span class="lbl" style="margin:0">Variant</span>
          <div class="seg" id="logoSeg">
            <button data-v="auto" class="on">Auto</button>
            <button data-v="white">White</button>
            <button data-v="dark">Charcoal</button>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <button id="btnLogoWhite" class="btn">Upload white SVG</button>
          <button id="btnLogoDark" class="btn">Upload dark SVG</button>
        </div>
        <input type="file" id="fileLogoWhite" accept=".svg,image/svg+xml" class="hidden" />
        <input type="file" id="fileLogoDark" accept=".svg,image/svg+xml" class="hidden" />
        <div id="logoSizeRow" class="space-y-1.5">
          <div class="flex items-center justify-between">
            <span class="lbl" style="margin:0">Logo size</span>
            <span id="logoSizeVal" class="eyebrow">104px</span>
          </div>
          <input id="logoSize" type="range" min="48" max="220" value="104" class="w-full" />
        </div>
        <div class="flex items-center justify-between">
          <p id="logoNote" class="text-[11px]" style="color:var(--ui-faint)">Using built-in mark.</p>
          <button id="btnLogoReset" class="text-[11px] underline" style="color:var(--ui-faint)">Reset</button>
        </div>
      </section>

      <hr class="div" />

      <section class="space-y-2">
        <div class="flex items-center justify-between">
          <span class="eyebrow">Caption</span>
          <button id="btnCopyCaption" class="text-[11px] underline" style="color:var(--ui-faint)">Copy</button>
        </div>
        <textarea id="fCaption" class="inp" rows="4" placeholder="Post caption (bokmål) — included as caption.txt in the export ZIP."></textarea>
      </section>

    </div>
  </aside>

function expandTemplate(tpl){
  return tpl.slides.map(s => ({
    bgType: tpl.theme,
    img: tpl.theme==='photo' ? (s.img||'') : '',
    tint: s.tint || '#1C3A5C',
    op: (s.op!=null ? s.op : 58),
    photoText: 'light',
    tag: s.tag||'', title: s.title||'', sub: s.sub||'', body: s.body||'',
    scale: 100, logoVariant: 'auto', alt: '',
  }));
}

/* ============================================================
   HISTORY (undo / redo)
   ============================================================ */
let undoStack = [], redoStack = [];
function snapshot(){ return JSON.stringify({ slides:project.slides, current:project.current, caption:project.caption, name:project.name, activeTpl:project.activeTpl }); }
function pushHistory(){ undoStack.push(snapshot()); if (undoStack.length>60) undoStack.shift(); redoStack=[]; markDirty(); saveLocal(); updateHistoryButtons(); }
function restore(str){ const s=JSON.parse(str); project.slides=s.slides; project.current=Math.min(s.current, s.slides.length-1); project.caption=s.caption||''; project.name=s.name||''; project.activeTpl=s.activeTpl; }
function undo(){ if(!undoStack.length) return; redoStack.push(snapshot()); restore(undoStack.pop()); renderAll(); updateHistoryButtons(); saveLocal(); toast('Undo'); }
function redo(){ if(!redoStack.length) return; undoStack.push(snapshot()); restore(redoStack.pop()); renderAll(); updateHistoryButtons(); saveLocal(); toast('Redo'); }
function updateHistoryButtons(){ $('btnUndo').disabled=!undoStack.length; $('btnRedo').disabled=!redoStack.length; }

let dirty=false;
function markDirty(){ dirty=true; $('dirtyDot').classList.remove('hidden'); }
function clearDirty(){ dirty=false; $('dirtyDot').classList.add('hidden'); }

/* ============================================================
   PERSISTENCE (localStorage autosave + JSON save/load)
   ============================================================ */
const LS_KEY = 'verminord_studio_v3';
let saveT;
function saveLocal(){
  clearTimeout(saveT);
  saveT = setTimeout(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ ratio:project.ratio, logo:project.logo, slides:project.slides, current:project.current, activeTpl:project.activeTpl, name:project.name, caption:project.caption, exportFormat })); }
    catch(e){ toast('Autosave paused — project too large for browser storage'); }
  }, 400);
}
function loadLocal(){
  try {
    const raw = localStorage.getItem(LS_KEY); if(!raw) return false;
    const s = JSON.parse(raw);
    if(!s.slides || !s.slides.length) return false;
    project.ratio=s.ratio||'45'; project.logo=s.logo||project.logo; project.slides=s.slides;
    project.current=Math.min(s.current||0, s.slides.length-1); project.activeTpl=s.activeTpl; project.name=s.name||''; project.caption=s.caption||'';
    document.querySelectorAll('#ratioSeg button').forEach(b=>b.classList.toggle('on', b.dataset.r===project.ratio));
    if(s.exportFormat){ exportFormat=s.exportFormat; document.querySelectorAll('#fmtSeg button').forEach(b=>b.classList.toggle('on', b.dataset.f===exportFormat)); }
    return true;
  } catch(e){ return false; }
}

const ratioH = () => project.ratio==='45'?1350 : project.ratio==='11'?1080 : 1920;

/* ============================================================
   BUILD A SLIDE
   ============================================================ */
function buildSlide(slide, ratio){
  const st = themeStyle(slide);
  const el = document.createElement('div');
  el.className = 'ig r'+ratio;
  if (st.solid) el.style.background = st.solid;

  if (slide.bgType==='photo'){
    if (slide.img){ const img=document.createElement('img'); img.className='ig-photo'; img.crossOrigin='anonymous'; img.src=slide.img; el.appendChild(img); }
    else el.style.background = C.navy;
    const tint=document.createElement('div'); tint.className='ig-tint'; tint.style.background=slide.tint; tint.style.opacity=slide.op/100; el.appendChild(tint);
  }

  const lvManual = slide.logoVariant && slide.logoVariant!=='auto';
  const lv = lvManual ? slide.logoVariant : st.logoVar;
  const markColor = lvManual ? (lv==='white'?C.white:C.ink) : st.logoColor;
  const logo=document.createElement('div'); logo.className='ig-logo';
  // priority: user-uploaded override → official brand lockup → drawn fallback
  const src = (lv==='white' ? project.logo.customWhite : project.logo.customDark)
           || BRAND_LOGO[lv==='white' ? 'white' : 'dark'];
  if (src){ logo.innerHTML=src; const svg=logo.querySelector('svg'); if(svg){ svg.style.height=(project.logo.size||104)+'px'; svg.style.width='auto'; svg.style.display='block'; } }
  else { logo.innerHTML=defaultMark(markColor); const wm=document.createElement('div'); wm.className='wm'; wm.style.color=markColor; wm.textContent='Verminord'; logo.appendChild(wm); }
  el.appendChild(logo);

  if (slide.tag){ const tag=document.createElement('div'); tag.className='ig-tag'; tag.style.color=st.accent; tag.textContent=slide.tag; el.appendChild(tag); }

  const center=document.createElement('div'); center.className='ig-center'; center.style.setProperty('--ts', slide.scale/100);
  if (slide.title){ const h=document.createElement('div'); h.className='ig-title'; h.style.color=st.title; h.textContent=slide.title; center.appendChild(h); }
  if (slide.sub){ const s=document.createElement('div'); s.className='ig-subtitle'; s.style.color=st.title; s.textContent=slide.sub; center.appendChild(s); }
  if (slide.body){ const b=document.createElement('div'); b.className='ig-body'; b.style.color=st.body; b.innerHTML=slide.body.split('\n').map(l=>esc(l)||'&nbsp;').join('<br>'); center.appendChild(b); }
  el.appendChild(center);

  const site=document.createElement('div'); site.className='ig-site'; site.style.color=st.accent; site.textContent='VERMINORD.COM'; el.appendChild(site);
  return el;
}

/* ============================================================
   RENDER — preview (+ overflow guard)
   ============================================================ */
function renderPreview(){
  const wrap=$('artWrap'); wrap.innerHTML='';
  const node=buildSlide(cur(), project.ratio);
  wrap.appendChild(node);
  fit();
  // overflow guard: does the centred block fit inside the safe band?
  requestAnimationFrame(() => {
    const center=node.querySelector('.ig-center');
    if(!center) return;
    const safeTop=176, safeBottom=150;
    const avail = ratioH() - safeTop - safeBottom;
    const contentH = center.scrollHeight - (186+150); // subtract padding baked into .ig-center
    node.classList.toggle('overflowing', contentH > avail);
  });
}
function fit(){
  const stage=$('stage'); const w=1080, h=ratioH();
  const scale=Math.min((stage.clientWidth-56)/w, (stage.clientHeight-56)/h, 0.9);
  const vp=$('viewport'); vp.style.transform=`scale(${scale})`; vp.style.width=w*scale+'px'; vp.style.height=h*scale+'px';
}
window.addEventListener('resize', fit);

/* filmstrip (debounced full rebuild) */
let filmT, dragFrom=null;
function renderFilmstrip(){
  clearTimeout(filmT);
  filmT = setTimeout(_renderFilmstrip, 60);
}
function _renderFilmstrip(){
  const fs=$('filmstrip'); fs.innerHTML='';
  const th=92, w=1080, h=ratioH(), scale=th/h;
  project.slides.forEach((slide,i) => {
    const box=document.createElement('button');
    box.style.cssText=`position:relative; flex:0 0 auto; width:${Math.round(w*scale)}px; height:${th}px; border-radius:7px; overflow:hidden; border:2px solid ${i===project.current?'var(--gold)':'var(--ui-line2)'}; background:#000; cursor:pointer`;
    const inner=document.createElement('div');
    inner.style.cssText=`position:absolute; top:0; left:0; width:${w}px; height:${h}px; transform:scale(${scale}); transform-origin:top left`;
    inner.appendChild(buildSlide(slide, project.ratio));
    box.appendChild(inner);
    const num=document.createElement('div'); num.textContent=i+1;
    num.style.cssText='position:absolute; top:3px; left:4px; font-size:9px; font-weight:700; color:#fff; background:rgba(0,0,0,.55); border-radius:4px; padding:0 4px; font-family:IBM Plex Mono,monospace';
    box.appendChild(num);
    box.onclick=()=>{ project.current=i; renderAll(); };
    // drag-to-reorder
    box.draggable=true;
    box.addEventListener('dragstart', e=>{ dragFrom=i; e.dataTransfer.effectAllowed='move'; try{ e.dataTransfer.setData('text/plain', String(i)); }catch(_){} box.style.opacity='.35'; });
    box.addEventListener('dragend', ()=>{ box.style.opacity='1'; document.querySelectorAll('#filmstrip button').forEach(x=>x.style.boxShadow=''); });
    box.addEventListener('dragover', e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; if(dragFrom!==i) box.style.boxShadow='inset 0 0 0 2px var(--gold)'; });
    box.addEventListener('dragleave', ()=>{ box.style.boxShadow=''; });
    box.addEventListener('drop', e=>{ e.preventDefault(); box.style.boxShadow=''; if(dragFrom==null||dragFrom===i){ dragFrom=null; return; } pushHistory(); const a=project.slides; const [moved]=a.splice(dragFrom,1); a.splice(i,0,moved); project.current=i; dragFrom=null; renderAll(); });
    fs.appendChild(box);
  });
  $('slideCount').textContent = (project.current+1)+' / '+project.slides.length;
}

function readSvg(e,key,label){ const f=e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>{ pushHistory(); project.logo[key]=sanitizeSvg(rd.result); renderAll(); toast(label+' logo uploaded'); }; rd.readAsText(f); e.target.value=''; }
function sanitizeSvg(str){
  const m=str.match(/<svg[\s\S]*<\/svg>/i); let svg=m?m[0]:str;
  svg=svg.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/on\w+="[^"]*"/gi,'');
  // Normalise so CSS height scales the artwork correctly:
  // 1. ensure a viewBox exists (derive from width/height attrs if missing)
  // 2. strip fixed width/height so the tool controls the rendered size
  const openMatch=svg.match(/<svg[^>]*>/i);
  if(openMatch){
    let open=openMatch[0];
    if(!/viewBox=/i.test(open)){
      const w=(open.match(/width="([\d.]+)\s*(?:px)?"/i)||[])[1];
      const h=(open.match(/height="([\d.]+)\s*(?:px)?"/i)||[])[1];
      if(w&&h) open=open.replace(/<svg/i, `<svg viewBox="0 0 ${w} ${h}"`);
    }
    open=open.replace(/\s(width|height)="[^"]*"/gi,'');
    svg=svg.replace(openMatch[0], open);
  }
  return svg;
}

document.addEventListener('keydown', e=>{
  const inField=/input|textarea/i.test(document.activeElement.tagName);
  const mod=e.metaKey||e.ctrlKey;
  if(mod && e.key.toLowerCase()==='z'){ e.preventDefault(); e.shiftKey?redo():undo(); return; }
  if(mod && e.key.toLowerCase()==='y'){ e.preventDefault(); redo(); return; }
  if(mod && e.key.toLowerCase()==='d'){ e.preventDefault(); $('btnDup').click(); return; }
  if(inField) return;
  if(e.altKey && e.key==='ArrowLeft'){ e.preventDefault(); moveSlide(-1); return; }
  if(e.altKey && e.key==='ArrowRight'){ e.preventDefault(); moveSlide(1); return; }
  if(e.key==='ArrowRight' && project.current<project.slides.length-1){ project.current++; renderAll(); }
  if(e.key==='ArrowLeft' && project.current>0){ project.current--; renderAll(); }
});

/* ============================================================
   EXPORT ENGINE
   ============================================================ */
const FACES=[["700 88px 'IBM Plex Sans'","IBM Plex Sans"],["italic 500 64px 'IBM Plex Serif'","IBM Plex Serif Italic"],["400 30px 'IBM Plex Serif'","IBM Plex Serif"],["400 20px 'IBM Plex Mono'","IBM Plex Mono"]];
async function ensureFonts(){
  await document.fonts.ready;
  await Promise.all(FACES.map(([f])=>document.fonts.load(f).catch(()=>{})));
  const missing=FACES.filter(([f])=>!document.fonts.check(f)).map(([,n])=>n);
  return missing;
}
async function waitImg(el){ const img=el.querySelector('img.ig-photo'); if(!img||!img.getAttribute('src')) return; if(img.complete&&img.naturalWidth) return; await new Promise(res=>{ img.onload=res; img.onerror=res; }); }
async function capture(slide){
  const node=buildSlide(slide, project.ratio);
  const holder=document.createElement('div'); holder.style.cssText='position:fixed;left:-20000px;top:0;'; holder.appendChild(node); document.body.appendChild(holder);
  try{ await waitImg(node); await new Promise(r=>setTimeout(r,60)); return await html2canvas(node,{ scale:2, useCORS:true, backgroundColor:'#1C3A5C', logging:false, width:1080, height:ratioH() }); }
  finally{ holder.remove(); }
}
const slug=s=>(s||'verminord').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'verminord';

/* export format — 'auto' = JPG for photos, PNG for solids */
let exportFormat='auto';
document.querySelectorAll('#fmtSeg button').forEach(b=>b.onclick=()=>{ document.querySelectorAll('#fmtSeg button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); exportFormat=b.dataset.f; saveLocal(); });
function fmtFor(slide){ if(exportFormat==='png') return 'png'; if(exportFormat==='jpg') return 'jpeg'; return slide.bgType==='photo' ? 'jpeg' : 'png'; }
const extOf=f=>f==='jpeg'?'jpg':'png';
function toBlob(canvas, f){ return new Promise(res=>canvas.toBlob(res, 'image/'+(f||'png'), f==='jpeg'?0.92:undefined)); }

$('btnExport').onclick=async()=>{
  const btn=$('btnExport'); const html=btn.innerHTML; btn.disabled=true;
  try{
    const missing=await ensureFonts();
    if(missing.length){ toastWarn('Fonts not ready ('+missing.join(', ')+') — export cancelled to avoid off-brand type. Check your connection.'); return; }
    const cnv=await capture(cur());
    const f=fmtFor(cur());
    const a=document.createElement('a'); a.download=`${slug(project.name)}-${String(project.current+1).padStart(2,'0')}-${project.ratio}.${extOf(f)}`; a.href=cnv.toDataURL('image/'+f, f==='jpeg'?0.92:undefined); a.click();
    toast('Exported slide '+(project.current+1));
  }catch(err){ toastWarn('Export failed — if you used a custom URL, upload the image instead'); console.error(err); }
  finally{ btn.disabled=false; btn.innerHTML=html; }
};

$('btnExportAll').onclick=async()=>{
  const btn=$('btnExportAll'); btn.disabled=true;
  try{
    const missing=await ensureFonts();
    if(missing.length){ toastWarn('Fonts not ready ('+missing.join(', ')+') — export cancelled. Check your connection.'); return; }
    const name=slug(project.name);
    const failed=[];
    if(typeof JSZip!=='undefined'){
      const zip=new JSZip();
      for(let i=0;i<project.slides.length;i++){
        btn.textContent=`Rendering ${i+1}/${project.slides.length}…`;
        try{ const cnv=await capture(project.slides[i]); const f=fmtFor(project.slides[i]); const blob=await toBlob(cnv,f); zip.file(`${name}-${String(i+1).padStart(2,'0')}-${project.ratio}.${extOf(f)}`, blob); }
        catch(err){ failed.push(i+1); console.error('slide',i+1,err); }
      }
      if(project.caption) zip.file('caption.txt', project.caption);
      if(project.slides.some(s=>s.alt&&s.alt.trim())) zip.file('alt-text.txt', project.slides.map((s,i)=>`Slide ${String(i+1).padStart(2,'0')}: ${(s.alt||'').trim()}`).join('\n')+'\n');
      btn.textContent='Zipping…';
      const out=await zip.generateAsync({type:'blob'});
      const a=document.createElement('a'); a.download=`${name}.zip`; a.href=URL.createObjectURL(out); a.click();
    } else {
      // fallback: sequential downloads
      for(let i=0;i<project.slides.length;i++){ try{ const cnv=await capture(project.slides[i]); const f=fmtFor(project.slides[i]); const a=document.createElement('a'); a.download=`${name}-${String(i+1).padStart(2,'0')}-${project.ratio}.${extOf(f)}`; a.href=cnv.toDataURL('image/'+f, f==='jpeg'?0.92:undefined); a.click(); await new Promise(r=>setTimeout(r,300)); }catch(err){ failed.push(i+1); } }
    }
    toast(failed.length ? `Exported ${project.slides.length-failed.length} of ${project.slides.length} — slide(s) ${failed.join(', ')} failed` : `Exported all ${project.slides.length} slides`);
  }catch(err){ toastWarn('Export failed'); console.error(err); }
  finally{ btn.disabled=false; btn.textContent='Export ZIP'; }
};

/* ============================================================
   TOAST
   ============================================================ */
let toastT;
function toast(msg,warn){ const t=$('toast'); t.textContent=msg; t.classList.toggle('warn',!!warn); t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'), warn?3600:1900); }
function toastWarn(msg){ toast(msg,true); }

$('tplSearch').oninput=e=>{ searchQ=e.target.value; renderTplList(); };

/* ============================================================
   BOOT
   ============================================================ */
if(!loadLocal()){ project.slides=expandTemplate(LIB[0]); project.name=LIB[0].name; project.caption=LIB[0].caption||''; }
renderTplList();
renderAll();
updateHistoryButtons();
document.fonts.ready.then(renderAll);
</script>
