name: Recover brand logos

# One-shot utility: the original logo PNGs only exist on the pre-rebuild
# Vercel deployment (the source was never committed). This fetches them from
# that deployment's still-live URL and commits them to public/, which in turn
# auto-deploys the site with the real logos.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: [".github/workflows/fetch-logos.yml"]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch logos from the old deployment
        # The deployment URL sits behind Vercel Authentication; the
        # _vercel_share token is a temporary (23 h) view-only bypass minted
        # for this recovery and worthless after it expires.
        run: |
          SHARE="_vercel_share=iQirPMK01xCuROE5esYEy945T5duXpOf"
          BASE="https://verminord-dash-iqjrza1zd-sahithewes-projects.vercel.app"
          curl -fsSL -c /tmp/jar -b /tmp/jar "$BASE/logo-white.png?$SHARE" -o public/logo-white.png
          curl -fsSL -c /tmp/jar -b /tmp/jar "$BASE/logo-dark.png?$SHARE" -o public/logo-dark.png
          file public/logo-white.png public/logo-dark.png
          # sanity: both must be real PNGs
          [ "$(head -c 4 public/logo-white.png | tail -c 3)" = "PNG" ]
          [ "$(head -c 4 public/logo-dark.png | tail -c 3)" = "PNG" ]

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/logo-white.png public/logo-dark.png
          if git diff --cached --quiet; then
            echo "Logos already committed — nothing to do."
          else
            git commit -m "Recover original logo PNGs from the pre-rebuild deployment"
            git push
          fi
