name: Deploy verminord-dash

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "apps/verminord-dash/**"

concurrency:
  group: deploy-verminord-dash
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_JulMIEERdRwigjNyInMvAMAI
  VERCEL_PROJECT_ID: prj_HyMdRHHETbKIpP10tkXWu1mEBR6W

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/verminord-dash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Keep the original brand assets: copy the logo PNGs from the live site
      # into public/ so the deployed app keeps the exact logos. If they can't
      # be fetched the app falls back to a styled text wordmark.
      - name: Fetch live brand assets (best effort)
        run: |
          curl -fsS https://dash.verminord.app/logo-dark.png -o public/logo-dark.png || true
          curl -fsS https://dash.verminord.app/logo-white.png -o public/logo-white.png || true
          ls -la public/ || true

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Smoke test
        run: |
          sleep 10
          curl -fsS https://dash.verminord.app/api/users
          echo
          curl -fsS -o /dev/null -w "front page: %{http_code}\n" https://dash.verminord.app/
