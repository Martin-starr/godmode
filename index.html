<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verminord — Instagram Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --navy:   #162340;
    --navy2:  #1e3060;
    --gold:   #c9a84c;
    --gold2:  #e8c96a;
    --white:  #f5f0e8;
    --muted:  #8a9ab5;
  }
  body { background: var(--navy); color: var(--white); font-family: 'Segoe UI', system-ui, sans-serif; }
  .gold { color: var(--gold); }
  .bg-card { background: var(--navy2); border: 1px solid rgba(201,168,76,0.2); }
  .badge { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.4); font-size: 0.65rem; letter-spacing: 0.12em; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
  .hook { font-size: 1.15rem; font-weight: 700; line-height: 1.35; color: #fff; }
  .btn-gold { background: var(--gold); color: var(--navy); font-weight: 700; border-radius: 6px; padding: 10px 24px; cursor: pointer; border: none; letter-spacing: 0.04em; transition: background 0.15s; }
  .btn-gold:hover { background: var(--gold2); }
  .btn-copy { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); border-radius: 4px; padding: 4px 10px; font-size: 0.72rem; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; font-weight: 600; }
  .btn-copy:hover { background: rgba(201,168,76,0.25); }
  .btn-copy.copied { background: rgba(80,200,120,0.15); color: #50c878; border-color: rgba(80,200,120,0.4); }
  .btn-sm { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 4px 10px; font-size: 0.7rem; cursor: pointer; transition: all 0.15s; }
  .btn-sm:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .slide-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 10px 12px; }
  .slide-num { color: var(--gold); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; }
  .divider { border-color: rgba(255,255,255,0.08); }
  .caption-text { font-size: 0.85rem; line-height: 1.7; color: #c8d4e8; white-space: pre-wrap; }
  .hashtags { font-size: 0.78rem; color: var(--muted); line-height: 1.7; }
  .alt-text { font-size: 0.75rem; color: #6a7a95; font-style: italic; }
  .section-label { font-size: 0.62rem; letter-spacing: 0.14em; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .collapse-btn { background: none; border: none; color: var(--muted); font-size: 0.72rem; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px; }
  .collapse-btn:hover { color: #fff; }
  .week-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  details summary { cursor: pointer; list-style: none; }
  details summary::-webkit-details-marker { display: none; }
  .theme-produksjon { border-left: 3px solid #c9a84c; }
  .theme-fakta      { border-left: 3px solid #5b8cf7; }
  .theme-bruk       { border-left: 3px solid #50c878; }
  .theme-resultat   { border-left: 3px solid #e87c5b; }
  .tag-produksjon { background: rgba(201,168,76,0.12); color: #c9a84c; border-color: rgba(201,168,76,0.35); }
  .tag-fakta      { background: rgba(91,140,247,0.12); color: #7aabff; border-color: rgba(91,140,247,0.35); }
  .tag-bruk       { background: rgba(80,200,120,0.12); color: #50c878; border-color: rgba(80,200,120,0.35); }
  .tag-resultat   { background: rgba(232,124,91,0.12); color: #f09070; border-color: rgba(232,124,91,0.35); }
  select { background: var(--navy2); color: var(--white); border: 1px solid rgba(201,168,76,0.3); border-radius: 6px; padding: 8px 14px; font-size: 0.85rem; cursor: pointer; }
  select:focus { outline: none; border-color: var(--gold); }
</style>
</head>
<body class="min-h-screen p-4 md:p-8">

<div class="max-w-5xl mx-auto mb-8">
  <div class="flex items-center justify-between flex-wrap gap-4 mb-2">
    <div>
      <div class="text-xs tracking-widest gold font-bold mb-1 uppercase">Verminord</div>
      <h1 class="text-2xl font-bold text-white">Instagram Post Generator</h1>
      <p class="text-sm mt-1" style="color:var(--muted)">Genererer ukentlige innlegg for @verminord — norsk, autentisk, klar til å poste.</p>
    </div>
    <div class="flex items-center gap-3 flex-wrap">
      <select id="langSelect" onchange="render()">
        <option value="no">🇳🇴 Norsk</option>
        <option value="en">🇬🇧 English</option>
      </select>
      <select id="weekCount" onchange="render()">
        <option value="5">5 innlegg</option>
        <option value="7" selected>7 innlegg</option>
      </select>
      <button class="btn-gold" onclick="regenerate()">⟳ Generer ny uke</button>
    </div>
  </div>
  <div class="flex gap-2 flex-wrap mt-3">
    <span class="badge tag-produksjon">Produksjon</span>
    <span class="badge tag-fakta">Fakta</span>
    <span class="badge tag-bruk">Bruksanvisning</span>
    <span class="badge tag-resultat">Resultat</span>
    <span class="text-xs ml-2" style="color:var(--muted)">Roterer gjennom alle temaer automatisk</span>
  </div>
</div>

<div id="postsGrid" class="max-w-5xl mx-auto grid gap-5 md:grid-cols-2"></div>

<div class="max-w-5xl mx-auto mt-6 text-center">
  <p class="text-xs" style="color:var(--muted)">Verminord AS · Klepp Stasjon, Jæren · www.verminord.com</p>
</div>

<script>
const templates_no = [
  { id:'P1', theme:'produksjon', themeLabel:'Produksjon', hook:'Her skjer det vi ikke alltid snakker om.', caption:`Meitemark, møkk og metode. Et blikk inn i produksjonen på Klepp Stasjon.\n\nVi bruker CFT-systemet — Continuous Flow-Through — en metode der substrat mates inn ovenfra og ferdig VermiCast høstes fra bunnen. Ingen snarveier. Ingen kunstige innsatsmidler.\n\nBare biologisk prosess, gjentatt og forbedret hver dag.\n\n📍 Klepp Stasjon, Jæren\n🔗 www.verminord.com`, slides:[{label:'BAK KULISSENE',title:'Her skjer det vi ikke alltid snakker om.',body:'Meitemark, møkk og metode. Et blikk inn i produksjonen på Klepp Stasjon.'},{label:'CFT-SYSTEM',title:'2 CFT-enheter i drift',body:'Continuous Flow-Through: substrat inn fra toppen, ferdig VermiCast høstes fra bunnen. Kontinuerlig prosess — 365 dager i året.'},{label:'RÅVARER',title:'Lokale innsatsmidler',body:'• Lamamøkk fra Jæren\n• Spent grain fra RYGR bryggeri\n• Spent mycelium fra soppfarmer\n• Tang og tare fra lokale strender\n• Papp og papirmakulering'},{label:'KLIMAKONTROLL',title:'Helårsdrift',body:'Temperatur, fuktighet og luftsirkulasjon overvåkes daglig. Eisenia fetida trives mellom 15–25 °C. Vi holder dem komfortable hele året.'},{label:'VERMINORD',title:'Produsert på Jæren.',body:'For norske dyrkere, bønder og grøntmiljøer.\nwww.verminord.com'}], hashtags:'#vermikompost #meitemark #produksjon #kleppstasjon #jæren #verminord #vermicast #bærekraft #biologiskjordbruk #cft #norskproduksjon', altText:'Produksjonsanlegg for vermikompost på Klepp Stasjon med CFT-enheter.' },
  { id:'P2', theme:'produksjon', themeLabel:'Produksjon', hook:'16-timers skift. Igjen og igjen.', caption:`Meitemarkene stopper ikke. Vi heller ikke.\n\nI en CFT-enhet jobber Eisenia fetida kontinuerlig — spiser, omdanner, produserer. De konsumerer opptil halvparten av sin egen kroppsvekt i organisk materiale daglig.\n\nDet er ingen offdag i en levende produksjon.\n\nVermiCast er resultatet av den jobben — biologisk aktiv, sporbar, dokumentert.\n\n🔗 www.verminord.com`, slides:[{label:'DRIFT',title:'16-timers skift.\nIgjen og igjen.',body:'Meitemarkene stopper ikke. Vi heller ikke.'},{label:'EISENIA FETIDA',title:'Den lille arbeideren bak alt vi lager.',body:'• Spiser opptil 50 % av kroppsvekt daglig\n• Produserer biologisk aktiv kastegjødsel\n• Trives mellom 15–25 °C\n• Jobber kontinuerlig i CFT-enheten'},{label:'PROSESS',title:'Fra topp til bunn',body:'Frisk substrat mates inn fra toppen. Meitemarkene jobber seg nedover. Ferdig VermiCast høstes fra bunnen. Kontinuerlig — ingen batching.'},{label:'KVALITET',title:'Levende produkt',body:'VermiCast er ikke stivnet jord. Det er et levende medium tett pakket med mikroorganismer og biologiske stimulatorer.'},{label:'VERMINORD',title:'Biologisk kraft fra Jæren.',body:'www.verminord.com'}], hashtags:'#meitemark #vermikompost #eiseniafetida #biologiskproduksjon #verminord #vermicast #jæren #norsklandbruk #kompost #jordbiologi', altText:'Nærbilde av Eisenia fetida meitemark i mørk, rik vermikompost fra Verminords CFT-produksjonsenhet.' },
  { id:'P3', theme:'produksjon', themeLabel:'Produksjon', hook:'Alt starter med det vi putter inn.', caption:`Råvarekjeden er ikke tilfeldig valgt.\n\nHver innsatsfaktor i VermiCast er valgt fordi den bidrar til biologisk mangfold, næringsprofil og strukturkvalitet i sluttproduktet.\n\nLamamøkk gir karbongrunnlag og ernæring. Spent grain fra RYGR bryggeri gir nitrogen og fuktighetsbevaring. Spent mycelium fra soppfarm tilfører mikrobiell diversitet. Tang fra Jæren-strender gir sporstoffer og algesyre.\n\nLokalt. Sporbart. Gjennomtenkt.\n\n🔗 www.verminord.com`, slides:[{label:'RÅVARER',title:'Alt starter med det vi putter inn.',body:'Råvarekjeden er ikke tilfeldig. Hvert element er valgt for å styrke sluttproduktet.'},{label:'KARBONKILDE',title:'Lamamøkk',body:'Primær karbonkilde og ernæringsgrunnlag. Lokalt levert fra Jæren. Lavt i patogener, høyt i organisk innhold.'},{label:'NITROGEN',title:'Spent grain',body:'Fra RYGR bryggeri og lokale samarbeidspartnere. Balanserer C:N-ratio og gir optimal fuktighetsretensjon.'},{label:'MIKROBIELL DIVERSITET',title:'Spent mycelium + tang',body:'Soppfarmer bidrar med brukt dyrkningssubstrat. Tang fra Jæren-strender tilfører sporstoffer og algesyre.'},{label:'VERMINORD',title:'Norsk råvare. Norsk produksjon.',body:'Sporbar fra kilde til sekk.\nwww.verminord.com'}], hashtags:'#råvarer #lamamøkk #spentgrain #jæren #verminord #vermicast #sirkulærøkonomi #biologiskjordbruk #bærekraft #norskproduksjon', altText:'Organiske råvarer brukt i Verminords produksjon: lamamøkk, spent grain og planteavfall fra lokale leverandører på Jæren.' },
  { id:'P4', theme:'produksjon', themeLabel:'Produksjon', hook:'Slik ser et høsting-øyeblikk ut.', caption:`Bunn av CFT-enheten. Meitemarkene har jobbet seg oppover. Det som er igjen under er ferdig VermiCast.\n\nHøsting skjer manuelt — vi sikter, kontrollerer og fyller 5-liters PP-sekker med batchnummer og beste-før-dato.\n\nHvert parti er sporbart. Hvert parti er labverifisert.\n\nDet er ikke «bare kompost». Det er dokumentert biologisk kvalitet.\n\n🔗 www.verminord.com`, slides:[{label:'HØSTING',title:'Slik ser et høsting-øyeblikk ut.',body:'Bunn av CFT-enheten. Meitemarkene har jobbet seg oppover. Ferdig VermiCast venter.'},{label:'PROSESS',title:'Fase 3 & 4',body:'3 — Ettermodning: biologisk aktivitet stabiliseres\n4 — Sikting & pakking: manuell sortering, batchmerking, sekkefylling'},{label:'SPORBARHET',title:'Batchsystem: VM-XXXX-XX',body:'Hvert parti merkes med unikt batchnummer og beste-før-dato. Du vet nøyaktig hva du kjøper.'},{label:'EMBALLASJE',title:'5L PP-sekk',body:'Pustende, ulamminert emballasje. Holder produktet levende under lagring. Tilpasset Verminord-etikett.'},{label:'VERMINORD',title:'Kvalitet som kan dokumenteres.',body:'www.verminord.com'}], hashtags:'#høsting #vermicast #verminord #sporbarhet #biologiskkvalitet #meitemark #naturgjødsel #jæren #norskproduksjon #kompost #pakking', altText:'Manuell høsting og sikting av ferdig VermiCast fra Verminords CFT-enhet på Klepp Stasjon.' },
  { id:'P5', theme:'produksjon', themeLabel:'Produksjon', hook:'Vi begynte med chili. Nå er dette fulltidsjobb.', caption:`Verminord startet som en personlig fascinasjon for jordbiologi under dyrking av chili, tomater og urter.\n\nNesten to tiår med erfaring la grunnlaget for det vi driver i dag: et fullskala produksjonsanlegg med klimakontrollerte enheter og dokumenterte resultater.\n\nGrunnideen er den samme: levende jord gir bedre vekst. Vi bare skalerte det opp.\n\n📍 Klepp Stasjon, Jæren\n🔗 www.verminord.com`, slides:[{label:'HISTORIEN',title:'Vi begynte med chili.\nNå er dette fulltidsjobb.',body:'Nesten to tiår med jordbiologi-erfaring bak alt vi gjør.'},{label:'GRUNNLAG',title:'Fra hobby til produksjon',body:'Startet med dyrking av chili, tomater og urter. Fascinasjonen for levende jord ble til et fullskala produksjonsanlegg.'},{label:'I DAG',title:'2 CFT-enheter i drift',body:'• Klimakontrollert produksjon helårs\n• Debio-registrert og Mattilsynet-sertifisert\n• Labverifisert produkt (ALS Lab Norway)\n• 100 % norske råvarer'},{label:'MISJON',title:'Levende jord til alle dyrkere',body:'Fra hobbygartnere til kommersielle produsenter — vermikompost bør være tilgjengelig, sporbar og konsistent.'},{label:'VERMINORD',title:'Laget av dyrkere, for dyrkere.',body:'www.verminord.com'}], hashtags:'#opprinnelse #historien #verminord #vermikompost #jæren #biologiskjordbruk #dyrking #kleppstasjon #bærekraft #norskproduksjon', altText:'Verminords produksjonsanlegg på Klepp Stasjon — startet som en lidenskap for jordbiologi.' },
  { id:'F1', theme:'fakta', themeLabel:'Fakta', hook:'Vermikompost er ikke det samme som kompost. Ikke engang nær.', caption:`Vanlig kompost brytes ned av bakterier og sopp. Vermikompost brytes ned AV meitemarkene — og resultatet er fundamentalt annerledes.\n\nVermiCast inneholder:\n→ Plantetilgjengelige næringsstoffer (ikke bundet)\n→ Millioner av mikroorganismer per gram\n→ Enzymer, humus og biologiske stimulatorer\n→ Naturlige veksthormoner (auxiner, cytokininer)\n\nKompost forbedrer strukturen i jorda.\nVermikompost aktiverer jordens eget immunforsvar.\n\nDet er forskjellen.\n\n🔗 www.verminord.com`, slides:[{label:'FAKTA',title:'Vermikompost er ikke det samme som kompost.\nIkke engang nær.',body:'Samme råvarer — helt annet produkt.'},{label:'VANLIG KOMPOST',title:'Termisk nedbryting',body:'• Bruker varme (50–70 °C) til å bryte ned\n• Dreper de fleste mikroorganismer\n• Næringsstoffer bundet i organisk materiale\n• Primært jordforbedrende'},{label:'VERMIKOMPOST',title:'Biologisk nedbryting',body:'• Brytes ned av Eisenia fetida ved 15–25 °C\n• Bevarer og formerer mikrobiell aktivitet\n• Næringsstoffer direkte plantetilgjengelige\n• Aktiverer jordens eget immunforsvar'},{label:'I JORDA',title:'Ikke bare gjødsel',body:'Humus, enzymer, naturlige veksthormoner (auxiner, cytokininer) og biologiske stimulatorer — ikke funnet i vanlig kompost.'},{label:'VERMINORD',title:'Biologisk aktiv jordforbedring.',body:'Dokumentert. Sporbar. Norsk.\nwww.verminord.com'}], hashtags:'#vermikompost #kompost #jordbiologi #fakta #meitemark #biologiskgjødsel #verminord #vermicast #naturgjødsel #jordforbedring', altText:'Sammenligning av vermikompost og vanlig kompost — biologisk aktivitet, næringsstoffprofil og jordpåvirkning.' },
  { id:'F2', theme:'fakta', themeLabel:'Fakta', hook:'Hva er egentlig inni den sekken?', caption:`VermiCast er ikke «bare møkk». Det er et levende produkt tett pakket med biologisk aktivitet.\n\nHver 5L sekk inneholder:\n• Plantetilgjengelige N, P, K — ikke bundet i organiske forbindelser\n• Millioner av nyttige bakterier og sopp per gram\n• Humusforbindelser som binder vann og næring i jorda\n• Enzymer som akselererer mineralnedbryting\n• Naturlige veksthormoner som stimulerer rotutvikling\n\nLabverifisert av ALS Lab Norway. Rapport NO2604972 tilgjengelig på forespørsel.\n\n🔗 www.verminord.com`, slides:[{label:'INNHOLD',title:'Hva er egentlig inni den sekken?',body:'VermiCast er ikke bare møkk. Det er et levende biologisk produkt.'},{label:'NÆRINGSSTOFFER',title:'N–P–K og mer',body:'Plantetilgjengelige nitrogen, fosfor og kalium — ikke bundet i organisk materiale. Direkte opptak fra første dag.'},{label:'MIKROBIOLOGI',title:'Millioner per gram',body:'Nyttige bakterier, sopp og mikroorganismer formeres under prosessen. Aktiverer jordens eget mikrobielle liv.'},{label:'BIOLOGISKE STIMULATORER',title:'Utover NPK',body:'• Humusforbindelser\n• Enzymer\n• Auxiner og cytokininer (veksthormoner)\n• Biologiske stimulatorer for rotutvikling'},{label:'DOKUMENTERT',title:'Labverifisert. Sporbar.',body:'ALS Lab Norway — rapport NO2604972.\nwww.verminord.com'}], hashtags:'#vermicast #næringsstoffer #jordbiologi #biologiskgjødsel #fakta #meitemark #verminord #labverifisert #plantenæring #humus #mikrobiologi', altText:'Nærbilde av rik, mørk VermiCast fra Verminord — et levende jordforbedringsmiddel.' },
  { id:'F3', theme:'fakta', themeLabel:'Fakta', hook:'NPK forteller deg ikke hele sannheten.', caption:`Nitrogen. Fosfor. Kalium.\n\nTre tall som styrer mesteparten av gjødselmarkedet. Men de forteller ingenting om jordbiologi, mikrobielt liv eller langsiktig jordhelse.\n\nPlanter trenger mer enn NPK:\n→ Levende mikroorganismer som omsetter næring\n→ Humus som holder på vann og mineraler\n→ Biologiske stimulatorer som reduserer stressrespons\n→ Enzymatisk aktivitet som bryter ned organisk materiale\n\nVermiCast leverer alt dette — og NPK i tillegg.\n\n🔗 www.verminord.com`, slides:[{label:'FAKTA',title:'NPK forteller deg ikke hele sannheten.',body:'Tre tall. Hele bildet er mye større.'},{label:'HVA NPK IKKE VISER',title:'Det du ikke ser på etiketten',body:'• Mikrobielt liv\n• Jordstruktur\n• Enzymatisk aktivitet\n• Humusdannelse\n• Vann- og næringsretensjon'},{label:'BIOLOGISK AKTIVITET',title:'Levende vs. kjemisk',body:'Kjemisk gjødsel løser opp og vaskes ut. Biologisk aktiv vermikompost bygger jord over tid — og gir planter tilgang på næring etter behov.'},{label:'LANGSIKTIG JORDHELSE',title:'Bygg jord, ikke avhengighet',body:'Etter én til to sesonger med VermiCast ser mange dyrkere redusert gjødselbehov. Jorda begynner å jobbe for seg selv.'},{label:'VERMINORD',title:'Biologisk kraft utover NPK.',body:'Dokumentert. Norsk. Sporbar.\nwww.verminord.com'}], hashtags:'#npk #biologiskgjødsel #jordbiologi #vermikompost #verminord #vermicast #jordhelse #bærekraft #plantenæring #organiskdyrking #fakta', altText:'Biologisk jordaktivitet og mikrobielt liv i jord behandlet med Verminords VermiCast.' },
  { id:'F4', theme:'fakta', themeLabel:'Fakta', hook:'Eisenia fetida. Den lille arbeideren bak alt vi lager.', caption:`Kompost-meitemarkens latinske navn er Eisenia fetida.\n\nDen er ikke en vanlig markorm. Den er en industrispesialist.\n\n• Spiser opptil 50 % av kroppsvekten i organisk materiale daglig\n• Produserer biologisk aktiv kastegjødsel rik på mikrobielt liv\n• Trives mellom 15–25 °C — vi holder dem komfortable hele året\n• Formeres raskt under optimale forhold\n• Jobber kontinuerlig i CFT-systemet — 365 dager i året\n\nUten dem finnes ikke VermiCast.\n\n🔗 www.verminord.com`, slides:[{label:'KOMPOST-MEITEMARK',title:'Eisenia fetida.\nDen lille arbeideren bak alt vi lager.',body:'Ikke en vanlig markorm. En biologisk industrispesialist.'},{label:'KAPASITET',title:'Opptil 50 % av kroppsvekt daglig',body:'Spiser, omdanner og produserer kontinuerlig. En kilo meitemark kan omdanne 0,5 kg organisk materiale per dag.'},{label:'OPTIMAL DRIFT',title:'15–25 °C',body:'Klimakontrollert produksjon sikrer optimal aktivitet helårs. Temperatur, fuktighet og luftsirkulasjon overvåkes daglig.'},{label:'PRODUKSJONSRESULTAT',title:'Biologisk aktiv kastegjødsel',body:'Kastegjødselen fra Eisenia fetida er rik på plantetilgjengelige næringsstoffer, mikroorganismer og biologiske stimulatorer.'},{label:'VERMINORD',title:'Drevet av natur. Dokumentert av vitenskap.',body:'www.verminord.com'}], hashtags:'#eiseniafetida #meitemark #kompostmeitemark #vermikompost #fakta #jordbiologi #biologiskproduksjon #verminord #vermicast #naturgjødsel', altText:'Nærbilde av Eisenia fetida — kompost-meitemark brukt i Verminords klimakontrollerte CFT-produksjonssystem.' },
  { id:'F5', theme:'fakta', themeLabel:'Fakta', hook:'Jord er ikke bare jord.', caption:`1 teskje frisk, biologisk aktiv jord inneholder opp til 1 milliard bakterier, 200 meter sopptråder og tusenvis av ulike mikroorganismer.\n\nDe fleste jordforbedringsprodukter ignorerer dette helt.\n\nVermiCast er designet for å styrke — ikke erstatte — det mikrobielle livet i jorda di.\n\nResultatet er jord som:\n✓ Tar opp næring mer effektivt\n✓ Holder bedre på vann\n✓ Motstår sykdomspress bedre\n✓ Produserer mer med samme input\n\n🔗 www.verminord.com`, slides:[{label:'JORDBIOLOGI',title:'Jord er ikke bare jord.',body:'1 teskje levende jord = opptil 1 milliard bakterier + 200 meter sopptråder.'},{label:'PROBLEMET',title:'Hva skjer med jordens mikrobiom?',body:'Kunstig gjødsel, sprøytemidler og pløying reduserer mikrobielt mangfold. Resultatet: jord som er avhengig av input for å produsere.'},{label:'LØSNINGEN',title:'Bygg opp — ikke bare tilsett',body:'VermiCast tilfører levende mikroorganismer og biologiske stimulatorer som styrker jordens eget mikrobielle nettverk.'},{label:'EFFEKTER',title:'Jord som jobber for deg',body:'✓ Bedre næringsopptak\n✓ Bedre vannretensjon\n✓ Økt motstandskraft mot sykdom\n✓ Redusert behov for kunstige input over tid'},{label:'VERMINORD',title:'Biologisk kraft fra Jæren.',body:'www.verminord.com'}], hashtags:'#jordbiologi #mikrobiom #bærekraftsjordbruk #vermikompost #verminord #biologiskgjødsel #jordmikrobiologi #hagestell #organiskdyrking', altText:'Rik, levende jord forbedret med Verminords VermiCast — full av mikrobiell aktivitet.' },
  { id:'B1', theme:'bruk', themeLabel:'Bruksanvisning', hook:'Du trenger ikke mye. Men du trenger riktig.', caption:`VermiCast er konsentrert. En liten mengde gjør mye — hvis du bruker det riktig.\n\nFor hagebed og pallekarm:\n→ Bland 10–20 % VermiCast inn i plantejord ved planting\n→ Eller legg 2–3 cm som topdressing rundt planter\n→ Vann inn etterpå for å aktivere biologien\n\nHusk: VermiCast er et levende produkt. Det vil fortsette å jobbe i jorda lenge etter at du har puttet det i.\n\nSpørsmål? Send oss en DM.\n🔗 www.verminord.com`, slides:[{label:'BRUKSANVISNING',title:'Du trenger ikke mye.\nMen du trenger riktig.',body:'VermiCast er konsentrert. Riktig bruk gir merkbart resultat.'},{label:'HAGEBED',title:'Blande inn ved planting',body:'Bland 10–20 % VermiCast inn i plantejorden. Fordel jevnt og plant direkte. Næring er tilgjengelig fra dag én.'},{label:'TOPDRESSING',title:'Rundt etablerte planter',body:'Legg 2–3 cm VermiCast rundt planten uten å røre røttene. Vann godt inn. Gjenta 2–3 ganger i sesongen.'},{label:'MENGDE',title:'Anbefalt dosering',body:'🪴 Potteplanter: 10–15 % av jordvolum\n🌿 Hagebed: 10–20 % ved planting\n🌳 Trær/busker: 0,5–1L per plante\n🌱 Frøspiring: 15–20 % i spirejord'},{label:'VERMINORD',title:'Spørsmål? Send oss en DM.',body:'5L VermiCast — 389 kr\nwww.verminord.com'}], hashtags:'#bruksanvisning #vermicast #verminord #hagebed #topdressing #hagestell #organiskgjødsel #jordforbedring #dyrketips #pallekarm #biologiskgjødsel', altText:'Hender som blander VermiCast inn i plantejord — anbefalt mengde er 10–20 % av jordvolumet.' },
  { id:'B2', theme:'bruk', themeLabel:'Bruksanvisning', hook:'Dine innendørsplanter mangler sannsynligvis dette.', caption:`Pottejord fra butikken er enten steril eller overgjødslet med syntetiske næringsstoffer.\n\nDet er greit for de første ukene. Etter det? Planten sitter i biologisk dead zone.\n\nSlik bruker du VermiCast for innendørsplanter:\n→ Bland 10–15 % VermiCast inn ved ompogging\n→ Legg 1–2 cm som topdressing i potten\n→ Vann normalt — VermiCast frigjør næring gradvis\n\nIngen brenging. Ingen overdose. Bare levende biologi.\n\n🔗 www.verminord.com`, slides:[{label:'INNENDØRS',title:'Dine innendørsplanter mangler sannsynligvis dette.',body:'Steril pottejord + syntetisk gjødsel = biologisk dead zone.'},{label:'PROBLEMET',title:'Hva skjer i potten din?',body:'Kommersiell pottejord tømmes for biologisk aktivitet innen 4–8 uker. Planten er avhengig av deg for næring — ikke jorda selv.'},{label:'LØSNINGEN',title:'VermiCast i pottejord',body:'Bland 10–15 % VermiCast ved ompogging. Tilsett levende biologi til potten. Planten begynner å jobbe med jorda — ikke mot den.'},{label:'TOPDRESSING INNENDØRS',title:'Enkel vedlikehold',body:'Legg 1–2 cm VermiCast på toppen av potten. Vann inn. Gjenta hver 6–8 uke i vekstsesong. Ingen brenging.'},{label:'VERMINORD',title:'Levende jord. Levende planter.',body:'5L VermiCast — 389 kr\nwww.verminord.com'}], hashtags:'#innendørsplanter #potteplanter #plantestell #vermicast #verminord #biologiskgjødsel #pottejord #plantenæring #hagestell #urbandyrking', altText:'Innendørsplante i potte med VermiCast blandet inn i jorda — levende biologisk aktivitet.' },
  { id:'B3', theme:'bruk', themeLabel:'Bruksanvisning', hook:'Start riktig — fra første dag i jorda.', caption:`Frøspiring og tidlig vekst er den perioden der biologi betyr aller mest.\n\nEn god spirejord med VermiCast gir:\n✓ Raskere og jevnere spiring\n✓ Sterkere røtter fra start\n✓ Plantetilgjengelig næring uten å brenne unge røtter\n✓ Naturlig beskyttelse mot damping off og soppangrep\n\nBland 15–20 % VermiCast inn i spirejord. Fyll brett. Så. Vann forsiktig.\n\nDet er alt. Biologien tar seg av resten.\n\n🔗 www.verminord.com`, slides:[{label:'FRØSPIRING',title:'Start riktig —\nfra første dag i jorda.',body:'Det biologiske grunnlaget legges ved spiring. Gi det beste fra start.'},{label:'SPIREJORD MED VERMICAST',title:'15–20 % VermiCast',body:'Bland inn i standard spirejord. Planten får tilgang til levende mikrobiologi og plantetilgjengelig næring fra det øyeblikket røttene strekker seg ut.'},{label:'FORDELER',title:'Hva VermiCast gir spirende planter',body:'✓ Raskere og jevnere spiring\n✓ Sterkere rotutvikling\n✓ Naturlig beskyttelse mot soppangrep\n✓ Næring uten brenging av unge røtter'},{label:'TIPS',title:'Slik gjør vi det',body:'Bland VermiCast grundig inn i spirejord. Fyll brett eller potter. Sørg for god fuktighet. Biologien er varmekjær — varm spireplass gir best resultat.'},{label:'VERMINORD',title:'Biologisk start. Sterkere vekst.',body:'5L VermiCast — 389 kr\nwww.verminord.com'}], hashtags:'#frøspiring #spirejord #dyrketips #vermicast #verminord #biologiskgjødsel #plantestell #kjøkkenhage #hagestell #tomat #chili #urt', altText:'Spirende frøplanter i spirejord blandet med Verminords VermiCast — sterkere røtter og jevnere spiring.' },
  { id:'B4', theme:'bruk', themeLabel:'Bruksanvisning', hook:'Den enkleste måten å bruke VermiCast på.', caption:`Topdressing. Det er det.\n\nDu trenger ikke å grave opp plantebed eller blande noe inn. Bare:\n\n1. Legg 2–3 cm VermiCast rundt planten\n2. Hold 5 cm avstand fra stengelen\n3. Vann godt inn\n4. La biologien jobbe\n\nFungerer på alt: tomater, urter, bærbusker, frukttrær, blomster, pallekarm.\n\nGjenta 2–3 ganger i sesongen. Det holder.\n\n🔗 www.verminord.com`, slides:[{label:'TOPDRESSING',title:'Den enkleste måten å bruke VermiCast på.',body:'Ingen graving. Ingen blanding. Bare legg på og vann inn.'},{label:'STEG FOR STEG',title:'Slik gjør du det',body:'1. Legg 2–3 cm VermiCast rundt planten\n2. Hold 5 cm avstand fra stengelen\n3. Vann godt inn\n4. La biologien jobbe'},{label:'FUNGERER PÅ',title:'Alle typer planter',body:'🍅 Tomat og paprika\n🌿 Urter og salatplanter\n🫐 Bærbusker og frukttrær\n🌸 Blomster og stauder\n🥬 Pallekarm og hagebed'},{label:'FREKVENS',title:'Hvor ofte?',body:'I vekstsesong: 2–3 ganger totalt er ofte nok. VermiCast frigjør næring gradvis over måneder — ikke på en gang.'},{label:'VERMINORD',title:'Enkelt. Effektivt. Biologisk.',body:'5L VermiCast — 389 kr\nwww.verminord.com'}], hashtags:'#topdressing #dyrketips #vermicast #verminord #hagestell #hagebed #organiskgjødsel #biologiskgjødsel #tomater #urter #pallekarm #kjøkkenhage', altText:'Topdressing med Verminords VermiCast rundt en tomatplante.' },

  { id:'R4', theme:'resultat', themeLabel:'Resultat & Bevis', hook:'Fra Jæren til hager og drivhus over hele Norge.', caption:`Verminord er Norges første dedikerte produsent av premium vermikompost.\n\nVi produserer for:\n• Hobbygartnere med pallekarm og kjøkkenhage\n• Dyrkere med drivhus og frøoppformering\n• Bønder og kommersielle grøntprodusenter\n• Alle som vil vite hva de tilfører jorda si\n\nVermiCast selges i 5L sekker. Leveres med labdokumentasjon og sporbar batchhistorikk.\n\nTilgjengelig på www.verminord.com\n\n🔗 389 kr / 5L`, slides:[{label:'VERMINORD',title:'Fra Jæren til hager og drivhus over hele Norge.',body:'Norges første dedikerte produsent av premium vermikompost.'},{label:'FOR HVEM',title:'Laget av dyrkere, for dyrkere',body:'• Hobbygartnere\n• Drivhus og frøoppformering\n• Kommersielle grøntprodusenter\n• Alle som vil vite hva de tilfører jorda'},{label:'PRODUKTET',title:'VermiCast — 5L',body:'389 kr inkl. mva. Pustende PP-sekk. Batchnummer og beste-før-dato. Tilgang til labdokumentasjon.'},{label:'NORSK',title:'100 % norsk produksjon',body:'Alle råvarer fra lokale norske leverandører. All produksjon ved Klepp Stasjon, Jæren, Rogaland.'},{label:'BESTILL',title:'Klar til å prøve?',body:'Bestill på www.verminord.com\neller send oss en DM.'}], hashtags:'#verminord #vermicast #norskproduksjon #jæren #biologiskgjødsel #hagestell #drivhus #kjøkkenhage #organiskdyrking #bærekraft #norgesgartner', altText:'Verminords VermiCast pakket i 5L PP-sekker — produsert på Klepp Stasjon, Jæren.' },

const themeOrder = ['produksjon','fakta','bruk','resultat'];
let currentPosts = [];
let usedIds = {produksjon:[],fakta:[],bruk:[],resultat:[]};

function getLang(){return document.getElementById('langSelect').value;}
function getTemplates(){return templates_no;}

function pickPost(theme){
  const pool=getTemplates().filter(t=>t.theme===theme);
  const used=usedIds[theme]||[];
  let available=pool.filter(t=>!used.includes(t.id));
  if(available.length===0){usedIds[theme]=[];available=pool;}
  const pick=available[Math.floor(Math.random()*available.length)];
  usedIds[theme].push(pick.id);
  return pick;
}

function generateWeek(){
  const count=parseInt(document.getElementById('weekCount').value);
  const posts=[];
  for(let i=0;i<count;i++){const theme=themeOrder[i%themeOrder.length];posts.push({...pickPost(theme),postNum:i+1});}
  return posts;
}

function regenerate(){usedIds={produksjon:[],fakta:[],bruk:[],resultat:[]};currentPosts=generateWeek();renderAll();}

function shuffleOne(idx){
  const post=currentPosts[idx];
  const fresh=pickPost(post.theme);
  currentPosts[idx]={...fresh,postNum:idx+1};
  const card=document.getElementById('post-card-'+idx);
  if(card){card.parentElement.innerHTML=buildPostHTML(currentPosts[idx],idx);}
}

function themeInfo(theme){
  const labels={produksjon:'Produksjon',fakta:'Fakta',bruk:'Bruksanvisning',resultat:'Resultat & Bevis'};
  return{cls:'theme-'+theme+' tag-'+theme,label:labels[theme]};
}

function copyText(text,btnEl){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btnEl.textContent;
    btnEl.textContent='✓ Kopiert';
    btnEl.classList.add('copied');
    setTimeout(()=>{btnEl.textContent=orig;btnEl.classList.remove('copied');},1800);
  });
}

function buildPostHTML(post,idx){
  const info=themeInfo(post.theme);
  const slideHTML=post.slides.map((s,si)=>`<div class="slide-card"><div class="slide-num mb-1">SLIDE ${si+1} — ${s.label}</div><div class="font-bold text-white text-sm mb-1">${s.title.replace(/\n/g,'<br>')}</div><div class="text-xs leading-relaxed" style="color:#9ab0cc;white-space:pre-wrap">${s.body}</div></div>`).join('');
  const allText=`${post.hook}\n\n${post.caption}\n\n${post.hashtags}`;
  return `<div class="bg-card rounded-xl p-5 flex flex-col gap-4 ${info.cls.split(' ')[0]}" id="post-card-${idx}">
    <div class="flex items-center justify-between gap-2 flex-wrap">
      <div class="flex items-center gap-2"><span class="badge ${info.cls}">${info.label}</span><span class="week-label">Innlegg ${post.postNum}</span></div>
      <button class="btn-sm" onclick="shuffleOne(${idx})">↺ Nytt innlegg</button>
    </div>
    <div><div class="section-label">Hook (første linje)</div><div class="hook">${post.hook}</div></div>
    <details><summary class="section-label cursor-pointer hover:text-white transition-colors">▸ Bildetekst</summary>
      <div class="mt-2"><div class="caption-text bg-black bg-opacity-20 rounded-lg p-3">${post.caption}</div>
      <div class="mt-2 flex justify-end"><button class="btn-copy" onclick="copyText(${JSON.stringify(post.caption)},this)">Kopier tekst</button></div></div>
    </details>
    <details><summary class="section-label cursor-pointer hover:text-white transition-colors">▸ Karuselltekst (${post.slides.length} slides)</summary>
      <div class="mt-2 flex flex-col gap-2">${slideHTML}
      <div class="flex justify-end mt-1"><button class="btn-copy" onclick="copyText(${JSON.stringify(post.slides.map((s,i)=>`SLIDE ${i+1} — ${s.label}\n${s.title}\n\n${s.body}`).join('\n\n---\n\n'))},this)">Kopier alle slides</button></div></div>
    </details>
    <div><div class="section-label">Emneknagger</div><div class="hashtags">${post.hashtags}</div>
      <div class="mt-1 flex justify-end"><button class="btn-copy" onclick="copyText(${JSON.stringify(post.hashtags)},this)">Kopier emneknagger</button></div>
    </div>
    <div><div class="section-label">Alt-tekst</div><div class="alt-text">${post.altText}</div></div>
    <hr class="divider">
    <button class="btn-copy w-full py-2 text-center" style="font-size:0.8rem" onclick="copyText(${JSON.stringify(allText)},this)">📋 Kopier alt</button>
  </div>`;
}

function renderAll(){
  if(currentPosts.length===0)currentPosts=generateWeek();
  document.getElementById('postsGrid').innerHTML=currentPosts.map((p,i)=>`<div>${buildPostHTML(p,i)}</div>`).join('');
}

currentPosts=generateWeek();
renderAll();
</script>
</body>
</html>
